<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .chat-bubble { max-width: 70%; padding: 12px 16px; border-radius: 18px; }
    .message-own { background: #7c3aed; color: white; border-bottom-right-radius: 4px; }
    .message-other { background: #27272a; border-bottom-left-radius: 4px; }
    .verified { color: #3b82f6; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <!-- AUTH -->
  <div id="auth-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto bg-violet-600 rounded-3xl flex items-center justify-center text-5xl font-black">V</div>
        <h1 class="text-4xl font-bold mt-4">Vikhrify</h1>
      </div>
      <input id="username" type="text" placeholder="Имя пользователя" class="w-full bg-zinc-800 rounded-2xl py-4 px-5 mb-4 outline-none">
      <input id="password" type="password" placeholder="Пароль" class="w-full bg-zinc-800 rounded-2xl py-4 px-5 mb-4 outline-none">
      <button onclick="login()" class="w-full py-4 bg-violet-600 rounded-2xl font-semibold mb-3">Войти</button>
      <button onclick="register()" class="w-full py-4 bg-zinc-800 rounded-2xl font-semibold">Создать аккаунт</button>
      <p id="auth-msg" class="text-center text-red-400 mt-4 min-h-[20px]"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden flex h-screen">
    <!-- SIDEBAR -->
    <div class="w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-2xl font-bold">V</div>
          <h1 class="text-2xl font-bold">Vikhrify</h1>
        </div>
        <button onclick="showAdmin()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">Админ</button>
      </div>
      <button onclick="showCreateChatModal()" class="mx-4 mt-4 py-3 bg-violet-600 hover:bg-violet-700 rounded-2xl font-semibold flex items-center justify-center gap-2">
        <i class="fas fa-plus"></i> Новый чат
      </button>
      <div id="chat-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="flex-1 flex flex-col">
      <div id="chat-header" class="h-16 border-b border-zinc-800 bg-zinc-900 px-6 flex items-center justify-between">
        <div class="flex items-center gap-4" id="header-content"></div>
        <i onclick="showMyProfile()" class="fas fa-user text-2xl cursor-pointer hover:text-violet-400"></i>
      </div>
      <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-zinc-950"></div>
      <div class="h-20 border-t border-zinc-800 bg-zinc-900 p-4 flex items-center gap-3">
        <input id="msg-input" type="text" placeholder="Сообщение..." class="flex-1 bg-zinc-800 rounded-3xl py-4 px-6 outline-none"
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" class="w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="w-72 bg-zinc-900 border-l border-zinc-800 p-6 hidden lg:flex flex-col" id="right-panel"></div>
  </div>

  <!-- NEW CHAT MODAL -->
  <div id="create-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-96 p-6">
      <h2 class="text-xl font-bold mb-4">Новый чат</h2>
      <input id="user-search" type="text" placeholder="Поиск пользователя..." class="w-full bg-zinc-800 rounded-2xl py-3 px-5 mb-4 outline-none"
             onkeyup="filterUsers()">
      <div id="user-list" class="max-h-96 overflow-y-auto"></div>
      <button onclick="closeCreateModal()" class="mt-6 w-full py-3 text-zinc-400">Отмена</button>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-96 p-8 text-center">
      <div id="my-big-avatar" class="text-8xl mx-auto mb-4"></div>
      <div id="my-username" class="text-2xl font-bold"></div>
      <div class="text-emerald-400 text-xl mt-2" id="my-vxr"></div>
      <button onclick="logout()" class="mt-8 w-full py-4 bg-red-600/20 text-red-400 rounded-2xl">Выйти</button>
      <button onclick="closeModal('profile-modal')" class="mt-4 text-zinc-500">Закрыть</button>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-4xl h-[90vh] flex flex-col">
      <div class="p-6 border-b flex justify-between">
        <h2 class="text-2xl font-bold">Админ Vikhrify</h2>
        <button onclick="closeModal('admin-modal')" class="text-3xl">×</button>
      </div>
      <div class="flex-1 p-6 overflow-auto" id="admin-content">
        <!-- заполняется JS -->
      </div>
    </div>
  </div>

<script>
const socket = io();
let currentUser = null;
let allUsers = [];
let myChats = [];
let currentChatId = null;
const ADMIN_PASS = "sehpy9-qiqjux-hofgyN";

async function api(method, url, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.json();
}

async function register() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!u || !p) return showAuthMsg('Заполни поля');
  const data = await api('POST', '/api/register', { username: u, password: p });
  if (data.success) showAuthMsg('Аккаунт создан! Войди.', false);
  else showAuthMsg(data.error || 'Ошибка');
}

async function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const data = await api('POST', '/api/login', { username: u, password: p });
  if (data.success) {
    currentUser = data.user;
    localStorage.setItem('vikhrify_user', JSON.stringify(currentUser));
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    await loadAllUsers();
    await loadMyChats();
  } else showAuthMsg(data.error || 'Ошибка входа');
}

function showAuthMsg(text, isError = true) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = isError ? 'text-red-400' : 'text-emerald-400';
}

async function loadAllUsers() {
  const data = await api('GET', '/api/users');
  allUsers = data;
}

async function loadMyChats() {
  const data = await api('GET', `/api/my-chats?userId=${currentUser.id}`);
  myChats = data;
  renderChatList();
  myChats.forEach(c => socket.emit('join-chat', c.id));
}

function renderChatList() {
  const container = document.getElementById('chat-list');
  container.innerHTML = '';
  myChats.forEach(chat => {
    const otherId = chat.participants.find(id => id !== currentUser.id);
    const other = allUsers.find(u => u.id === otherId);
    if (!other) return;
    const last = chat.messages.length ? chat.messages.at(-1).text.slice(0,35)+'…' : 'Новый чат';
    const div = document.createElement('div');
    div.className = p-4 hover:bg-zinc-800 cursor-pointer flex gap-4 ${currentChatId === chat.id ? 'bg-zinc-800' : ''};
    div.innerHTML = `
      <div class="text-4xl">${other.emoji}</div>
      <div class="flex-1">
      <div class="flex items-center gap-2 font-medium">${other.username} ${other.verified ? '<span class="verified">✔</span>' : ''}</div>
        <div class="text-sm text-zinc-400">${last}</div>
      </div>
    `;
    div.onclick = () => openChat(chat.id);
    container.appendChild(div);
  });
}

async function showCreateChatModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  renderUserListForCreate();
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
}

function filterUsers() {
  renderUserListForCreate();
}

function renderUserListForCreate() {
  const container = document.getElementById('user-list');
  const search = document.getElementById('user-search').value.toLowerCase();
  container.innerHTML = '';
  allUsers.forEach(user => {
    if (user.id === currentUser.id) return;
    if (myChats.some(c => c.participants.includes(user.id))) return;
    if (search && !user.username.toLowerCase().includes(search)) return;

    const div = document.createElement('div');
    div.className = 'flex items-center gap-4 p-4 hover:bg-zinc-800 rounded-2xl cursor-pointer';
    div.innerHTML = <span class="text-4xl">${user.emoji}</span><span class="font-medium">${user.username}</span>;
    div.onclick = () => createNewChat(user.id);
    container.appendChild(div);
  });
}

async function createNewChat(withUserId) {
  const data = await api('POST', '/api/create-chat', { userId: currentUser.id, withUserId });
  if (data.success) {
    closeCreateModal();
    await loadMyChats();
    openChat(data.chat.id);
  }
}

function openChat(chatId) {
  currentChatId = chatId;
  const chat = myChats.find(c => c.id === chatId);
  const otherId = chat.participants.find(id => id !== currentUser.id);
  const other = allUsers.find(u => u.id === otherId);

  document.getElementById('header-content').innerHTML = `
    <div class="text-4xl">${other.emoji}</div>
    <div>
      <div class="font-semibold flex items-center gap-2">${other.username} ${other.verified ? '<span class="verified text-2xl">✔</span>' : ''}</div>
      <div class="text-xs text-emerald-400">в сети</div>
    </div>
  `;

  document.getElementById('right-panel').innerHTML = `
    <div class="text-center">
      <div class="text-8xl mb-6">${other.emoji}</div>
      <div class="text-2xl font-bold">${other.username}</div>
      <div class="text-emerald-400 text-xl mt-2">${other.vxr} VXR</div>
      ${other.verified ? <div class="mt-8 text-blue-400 text-4xl">✔ Верифицирован</div> : ''}
    </div>
  `;

  renderMessages(chat);
  renderChatList();
}

function renderMessages(chat) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  chat.messages.forEach(m => {
    const isOwn = m.from === currentUser.id;
    const other = allUsers.find(u => u.id === m.from);
    const bubble = document.createElement('div');
    bubble.className = flex ${isOwn ? 'justify-end' : 'justify-start'};
    bubble.innerHTML = `
      <div class="chat-bubble ${isOwn ? 'message-own' : 'message-other'}">
        ${m.text}
        <div class="text-[10px] mt-1 opacity-70">${m.time}</div>
      </div>
    `;
    container.appendChild(bubble);
  });
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentChatId) return;

  socket.emit('send-message', { chatId: currentChatId, from: currentUser.id, text });
  input.value = '';
}

socket.on('new-message', (data) => {
  const chat = myChats.find(c => c.id === data.chatId);
  if (chat) {
    chat.messages.push(data.msg);
    if (currentChatId === data.chatId) renderMessages(chat);
    renderChatList();
  }
});

function showMyProfile() {
  document.getElementById('my-big-avatar').textContent = currentUser.emoji;
  document.getElementById('my-username').textContent = currentUser.username;
  document.getElementById('my-vxr').textContent = currentUser.vxr + ' VXR';
  document.getElementById('profile-modal').classList.remove('hidden');
}
  function logout() {
  localStorage.removeItem('vikhrify_user');
  location.reload();
}

// ADMIN
function showAdmin() {
  document.getElementById('admin-modal').classList.remove('hidden');
  renderAdmin();
}

async function renderAdmin() {
  const cont = document.getElementById('admin-content');
  cont.innerHTML = <table class="w-full"><thead><tr><th class="p-4">Пользователь</th><th>VXR</th><th>Вериф</th><th>Блок</th><th>Действия</th></tr></thead><tbody id="admin-tbody"></tbody></table>;
  const tbody = document.getElementById('admin-tbody');
  allUsers.forEach((u, i) => {
    if (u.id === currentUser.id) return;
    const tr = document.createElement('tr');
    tr.className = 'border-t border-zinc-800';
    tr.innerHTML = `
      <td class="p-4 flex items-center gap-3"><span class="text-3xl">${u.emoji}</span> ${u.username}</td>
      <td class="p-4 font-mono">${u.vxr}</td>
      <td class="p-4"><input type="checkbox" ${u.verified?'checked':''} onchange="adminAction('verify',${u.id},this.checked)"></td>
      <td class="p-4">${u.blocked ? 'Заблокирован' : 'Активен'}</td>
      <td class="p-4">
        <button onclick="adminAction('vxr',${u.id},100)" class="px-3 py-1 bg-green-700 rounded text-xs">+100 VXR</button>
        <button onclick="adminAction('vxr',${u.id},-100)" class="px-3 py-1 bg-red-700 rounded text-xs">-100 VXR</button>
        <button onclick="adminAction('block',${u.id},!${u.blocked})" class="px-3 py-1 ${u.blocked?'bg-green-700':'bg-red-700'} rounded text-xs">${u.blocked?'Разблок':'Блок'}</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function adminAction(action, targetId, value) {
  await api('POST', '/api/admin/action', { pass: ADMIN_PASS, action, targetId, value });
  await loadAllUsers();
  renderAdmin();
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// START
window.onload = () => {
  const saved = localStorage.getItem('vikhrify_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    loadAllUsers().then(() => loadMyChats());
  }
};
</script>
</body>
</html>
