<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель</title>
  <style>
    body { background:#0d1117; color:#c9d1d9; padding:20px; font-family:Arial; }
    .card { background:#161b22; padding:24px; border-radius:12px; max-width:600px; margin:auto; }
    input, select, button { width:100%; padding:12px; margin:10px 0; border-radius:6px; }
    input, select { background:#0d1117; border:1px solid #30363d; color:white; }
    button { background:#238636; color:white; border:none; cursor:pointer; }
    button.danger { background:#c94a4a; }
  </style>
</head>
<body>
<div class="card">
  <h1>Админ-панель</h1>
  <input id="target" placeholder="Юзернейм цели">
  <select id="badge">
    <option value="none">Снять галочку</option>
    <option value="blue">Синяя</option>
    <option value="yellow">Жёлтая</option>
    <option value="red">Красная</option>
  </select>
  <button onclick="setBadge()">Выдать галочку</button>

  <input id="fake-user" placeholder="Юзернейм для накрутки">
  <input id="fake-count" type="number" value="100" placeholder="Количество">
  <button onclick="fakeFollowers()">Накрутить подписчиков</button>

  <button class="danger" onclick="clearFeed()">Очистить ленту</button>
</div>

<script>
async function setBadge() {
  const username = document.getElementById('target').value.trim();
  const badge = document.getElementById('badge').value;
  await fetch('/api/set-badge', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({targetUsername:username, badge})});
  alert('Готово');
}
async function fakeFollowers() {
  const username = document.getElementById('fake-user').value.trim();
  const amount = parseInt(document.getElementById('fake-count').value);
  await fetch('/api/fake-followers', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({targetUsername:username, amount})});
  alert('Накручено');
}
async function clearFeed() {
  await fetch('/api/clear-posts', {method:'POST'});
  alert('Лента очищена');
}
</script>
</body>
</html>
