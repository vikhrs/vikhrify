<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ Vikrify</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
    #login-form { max-width:420px; margin:80px auto; background:#1e293b; padding:32px; border-radius:12px; }
    input, button { width:100%; padding:14px; margin:12px 0; border-radius:8px; border:none; font-size:1.1em; }
    button { background:#3b82f6; color:white; cursor:pointer; font-weight:bold; }
    button:hover { background:#2563eb; }
    #admin-content { display:none; }
    table { width:100%; border-collapse:collapse; margin:24px 0; }
    th, td { padding:10px; border:1px solid #334155; text-align:left; }
    th { background:#1e293b; }
  </style>
</head>
<body>

<div id="login-form">
  <h2 style="text-align:center; margin-bottom:24px;">Админ-панель</h2>
  <input type="password" id="admin-pass" placeholder="Пароль админа">
  <button onclick="loginAdmin()">Войти</button>
</div>

<div id="admin-content">
  <h1>Управление пользователями</h1>
  <table id="users-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>@username</th>
        <th>Имя</th>
        <th>Баланс VXR</th>
        <th>Вериф.</th>
        <th>Бан</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const ADMIN_PASS = 'sehpy9-qiqjux-hofgyN'; // можно убрать, если хочешь только серверную проверку

function loginAdmin() {
  const pass = document.getElementById('admin-pass').value;
  if (pass !== ADMIN_PASS) {
    alert('Неверный пароль');
    return;
  }

  document.getElementById('login-form').style.display = 'none';
  document.getElementById('admin-content').style.display = 'block';
  loadUsers();
}

async function loadUsers() {
  try {
    const res = await fetch('/api/admin/users', {
      headers: { 'x-admin-password': ADMIN_PASS }
    });
    if (!res.ok) throw new Error(await res.text());

    const users = await res.json();
    const tbody = document.querySelector('#users-table tbody');
    tbody.innerHTML = '';

    users.forEach(u => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${u.id}</td>
        <td>@${u.username}</td>
        <td>${u.name}</td>
        <td>
          <input type="number" value="${u.balance}" style="width:90px;padding:6px;">
          <button onclick="updateBalance(${u.id}, this.previousElementSibling.value)">Сохранить</button>
        </td>
        <td>
          <button onclick="toggleVerify(${u.id}, ${!u.isVerified})">
            ${u.isVerified ? 'Снять галочку' : 'Выдать галочку'}
          </button>
        </td>
        <td>
          <button onclick="toggleBan(${u.id}, ${!u.isBlocked})">
            ${u.isBlocked ? 'Разбанить' : 'Забанить'}
          </button>
        </td>
        <td></td>
      `;
      tbody.appendChild(tr);
    });
  } catch (err) {
    alert('Ошибка загрузки: ' + err.message);
  }
}

async function updateBalance(userId, newBalance) {
  const bal = Number(newBalance);
  if (isNaN(bal)) return alert('Некорректное число');

  await fetch('/api/admin/update-user', {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-password': ADMIN_PASS
    },
    body: JSON.stringify({ id: userId, balance: bal })
  });
  alert('Баланс обновлён');
}

async function toggleVerify(userId, newVerified) {
  await fetch('/api/admin/update-user', {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-password': ADMIN_PASS
    },
    body: JSON.stringify({ id: userId, isVerified: newVerified })
  });
  loadUsers();
}

async function toggleBan(userId, newBlocked) {
  await fetch('/api/admin/update-user', {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-password': ADMIN_PASS
    },
    body: JSON.stringify({ id: userId, isBlocked: newBlocked })
  });
  loadUsers();
}
</script>
</body>
</html>
