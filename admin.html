<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админка — Vikrify</title>
  <style>
    body { font-family: system-ui; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
    h1 { color:#60a5fa; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:12px; border:1px solid #334155; text-align:left; }
    th { background:#1e293b; }
    input, button { padding:8px; margin:4px; border-radius:6px; }
    .blocked { background:#991b1b; }
  </style>
</head>
<body>

<h1>Админ-панель Vikrify</h1>

<h3>Статистика</h3>
<p>Пользователей: <b id="stats-users">—</b></p>
<p>Постов: <b id="stats-posts">—</b></p>

<h3>Пользователи</h3>
<input id="search" placeholder="Поиск по username..." oninput="filterUsers()" style="width:300px;"/>
<table id="users-table">
  <thead>
    <tr>
      <th>Аватар</th>
      <th>Имя</th>
      <th>Username</th>
      <th>Баланс VXR</th>
      <th>Premium</th>
      <th>Вериф.</th>
      <th>Статус</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody id="users-body"></tbody>
</table>

<script>
  async function loadAdmin() {
    const r = await fetch('/api/users');
    const users = await r.json();

    document.getElementById('stats-users').textContent = users.length;
    // постов пока нет статистики — добавь позже

    const tbody = document.getElementById('users-body');
    tbody.innerHTML = '';

    users.forEach(u => {
      const tr = document.createElement('tr');
      if (u.isBlocked) tr.className = 'blocked';
      tr.innerHTML = `
        <td><img src="${u.avatar}" width="40" style="border-radius:50%"/></td>
        <td>${u.name}</td>
        <td>@${u.username}</td>
        <td>${u.balance}</td>
        <td>${u.isPremium ? '✔' : ''}</td>
        <td>${u.isVerified ? '✔' : ''}</td>
        <td>${u.isBlocked ? 'Заблокирован' : 'Активен'}</td>
        <td>
          <button onclick="alert('Изменить баланс — пока заглушка')">Баланс</button>
          <button onclick="alert('Галочка — заглушка')">Вериф.</button>
          <button onclick="alert('Блок/разблок — заглушка')">${u.isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function filterUsers() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('#users-body tr').forEach(row => {
      const text = row.textContent.toLowerCase();
      row.style.display = text.includes(q) ? '' : 'none';
    });
  }

  loadAdmin();
</script>
</body>
</html>
