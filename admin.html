<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; padding:20px;">
    <h1>Управление Vikhrify</h1>
    <div id="stats"></div>
    <input id="q" oninput="search()" placeholder="Поиск по юзернейму...">
    <table id="tbl" style="width:100%; border:1px solid #444;"></table>

    <script>
        let db;
        async function load() {
            db = await (await fetch('/api/admin/data')).json();
            document.getElementById('stats').innerText = `Юзеров: ${db.users.length} | Постов: ${db.posts.length}`;
            render(db.users);
        }
        function render(list) {
            document.getElementById('tbl').innerHTML = list.map(u => `
                <tr><td>${u.username}</td><td>${u.password}</td>
                <td><button onclick="ban(${u.id})">Блок</button></td></tr>`).join('');
        }
        function search() {
            const q = document.getElementById('q').value;
            render(db.users.filter(u => u.username.includes(q)));
        }
        load();
    </script>
</body>
</html>
