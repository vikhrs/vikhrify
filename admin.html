<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify Admin</title>
  <style>
    body { margin:0; padding:1rem; font-family:Arial,sans-serif; background:#0d1117; color:#c9d1d9; }
    h1 { color:#58a6ff; text-align:center; }
    .user { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:1rem; margin:1rem 0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; }
    button { padding:0.6rem 1rem; border-radius:6px; cursor:pointer; border:none; font-weight:bold; }
    .btn-verify { background:#238636; color:white; }
    .btn-unverify { background:#444c56; color:white; }
    .btn-balance { background:#9d7fff; color:black; }
    .btn-block { background:#f85149; color:white; }
    .btn-unblock { background:#3fb950; color:black; }
    #msg { text-align:center; margin:1rem; font-size:1.2rem; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
  </style>
</head>
<body>

<h1>Админ-панель</h1>
<div id="msg"></div>

<h2>Пользователи</h2>
<div id="users"></div>

<script>
  const msg = document.getElementById('msg');
  const usersDiv = document.getElementById('users');

  function showMsg(text, ok = false) {
    msg.innerHTML = <span class="${ok ? 'ok' : 'err'}">${text}</span>;
  }

  async function loadUsers() {
    try {
      const r = await fetch('/users');
      const users = await r.json();
      usersDiv.innerHTML = users.map(u => `
        <div class="user">
          <div>
            <strong>@${u.username}</strong><br>
            Баланс: ${u.balance || 0} VXR<br>
            Верификация: ${u.verified ? '✓' : '—'}<br>
            Блок: ${u.blocked ? 'Заблокирован' : 'Активен'}
          </div>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <button class="btn-balance" onclick="addBalance('${u.username}')">+ VXR</button>
            ${u.verified 
              ? <button class="btn-unverify" onclick="toggleVerify('${u.username}', false)">Забрать галочку</button>
              : <button class="btn-verify" onclick="toggleVerify('${u.username}', true)">Выдать галочку</button>
            }
            ${u.blocked 
              ? <button class="btn-unblock" onclick="toggleBlock('${u.username}', false)">Разблокировать</button>
              : <button class="btn-block" onclick="toggleBlock('${u.username}', true)">Заблокировать</button>
            }
          </div>
        </div>
      `).join('') || '<p>Нет пользователей</p>';
    } catch {
      showMsg('Ошибка загрузки пользователей');
    }
  }

  async function addBalance(username) {
    const amt = prompt('Сколько VXR начислить?');
    if (!amt || isNaN(amt)) return;
    try {
      const r = await fetch('/admin/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, field: 'balance', value: Number(amt)})
      });
      const d = await r.json();
      showMsg(d.success ? 'Начислено!' : d.error, d.success);
      loadUsers();
    } catch {}
  }

  async function toggleVerify(username, value) {
    try {
      const r = await fetch('/admin/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, field: 'verified', value})
      });
      const d = await r.json();
      showMsg(d.success ? Галочка ${value ? 'выдана' : 'забрана'} : d.error, d.success);
      loadUsers();
    } catch {}
  }

  async function toggleBlock(username, value) {
    try {
      const r = await fetch('/admin/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, field: 'blocked', value})
      });
      const d = await r.json();
      showMsg(d.success ? Пользователь ${value ? 'заблокирован' : 'разблокирован'} : d.error, d.success);
      loadUsers();
    } catch {}
  }

  loadUsers();
</script>
</body>
</html>
