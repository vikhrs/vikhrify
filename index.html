<!-- index.html (полная замена приветственного экрана) -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app { width: 100%; max-width: 420px; padding: 20px; }

        /* Auth Screen */
        #auth-screen {
            background: rgba(30, 30, 60, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(100,100,255,0.15);
        }
        h1 {
            text-align: center;
            font-size: 2.4rem;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #a0a0ff;
            margin-bottom: 32px;
            font-size: 1.05rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: none;
            border-radius: 12px;
            background: rgba(50,50,90,0.6);
            color: white;
            font-size: 1rem;
            transition: all 0.25s;
        }
        input:focus {
            outline: none;
            background: rgba(70,70,110,0.8);
            box-shadow: 0 0 0 2px rgba(124,58,237,0.5);
        }
        .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a0ff;
            font-size: 1.2rem;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        #btn-register {
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            color: white;
        }
        #btn-login {
            background: linear-gradient(90deg, #4f46e5, #6366f1);
            color: white;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124,58,237,0.4);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #a0a0ff;
            cursor: pointer;
        }
        .toggle-link:hover { color: #c4b5fd; text-decoration: underline; }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 6px;
            text-align: center;
            display: none;
        }

        /* Hide main screen initially */
        #main-screen { display: none; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="client.js" defer></script>
</head>
<body>
    <div id="app">
        <!-- Приветственный экран (регистрация / вход) -->
        <div id="auth-screen">
            <h1>Vikhrify</h1>
            <p class="subtitle">Добро пожаловать!</p>

            <!-- Форма регистрации -->
            <div id="register-form">
                <div class="form-group">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="reg-name" placeholder="Имя" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-at icon"></i>
                    <input type="text" id="reg-username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="reg-password" placeholder="Пароль" required>
                </div>
                <button id="btn-register" onclick="register()">Создать аккаунт</button>
                <div id="reg-error" class="error-msg"></div>
            </div>

            <!-- Форма входа (скрыта по умолчанию) -->
            <div id="login-form" style="display: none;">
                <div class="form-group">
                    <i class="fas fa-at icon"></i>
                    <input type="text" id="login-username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                </div>
                <button id="btn-login" onclick="login()">Войти</button>
                <div id="login-error" class="error-msg"></div>
            </div>

            <div class="toggle-link" id="toggle-link" onclick="toggleForms()">
                Уже есть аккаунт? Войти
            </div>
        </div>

        <!-- Основной экран приложения (остаётся как был) -->
        <div id="main-screen">
            <!-- ... весь твой предыдущий код основного интерфейса (бургер, лента, чаты, профиль и т.д.) ... -->
            <!-- Просто вставь сюда свой предыдущий HTML-код main-screen без изменений -->
        </div>
    </div>
</body>
</html>
