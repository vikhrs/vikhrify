<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VXR • Соцсеть + мессенджер</title>
  <style>
    :root {
      --bg: #0f0f17;
      --card: #1a1a2e;
      --accent: #00aaff;
      --accent-dark: #0077cc;
      --text: #e0e0ff;
      --gray: #8888aa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 70px;
    }
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--card);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid #333366;
    }
    .logo { font-weight: bold; font-size: 1.3rem; color: var(--accent); }
    .auth-btns button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      margin-left: 8px;
      cursor: pointer;
    }
    .auth-btns button:nth-child(2) { background: #444466; }

    main { padding: 70px 16px 90px; max-width: 720px; margin: 0 auto; }

    .screen { display: none; }
    .screen.active { display: block; }

    .post {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: #444; }
    .username { font-weight: 600; }
    .time { color: var(--gray); font-size: 0.8rem; }

    .new-post {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .new-post textarea {
      width: 100%;
      min-height: 80px;
      background: #222244;
      border: 1px solid #444466;
      color: white;
      padding: 12px;
      border-radius: 8px;
      resize: vertical;
      margin-bottom: 12px;
    }
    .new-post input[type="file"] { display: none; }
    .new-post .attach { 
      background: #334455; 
      color: white; 
      padding: 8px 14px; 
      border-radius: 8px; 
      cursor: pointer; 
      display: inline-block;
    }
    .new-post button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      float: right;
    }

    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #333366;
    }
    nav button {
      background: none;
      border: none;
      color: var(--gray);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 8px 16px;
    }
    nav button.active { color: var(--accent); font-weight: bold; }

    .fab {
      position: fixed;
      bottom: 80px;
      right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0,170,255,0.4);
      cursor: pointer;
      border: none;
    }
    .fab.voice { background: #0066ff; right: 100px; }

    .profile-header {
      text-align: center;
      margin: 20px 0 40px;
    }
    .big-avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #444;
      margin: 0 auto 16px;
      border: 4px solid var(--accent);
    }
    .balance { color: #ffcc00; font-size: 1.3rem; margin: 12px 0; }

    .chat-list .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--card);
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
    }

    .hidden { display: none !important; }

    @media (max-width: 500px) {
      .fab.
      voice { right: 80px; bottom: 85px; width: 48px; height: 48px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">VXR</div>
  <div class="auth-btns">
    <button id="btnLogin"    class="hidden">Войти</button>
    <button id="btnRegister" class="hidden">Регистрация</button>
    <button id="btnLogout"   class="hidden">Выйти</button>
  </div>
</header>

<main>

  <!-- Экран приветствия / регистрации -->
  <div id="welcome" class="screen active">
    <h2 style="text-align:center; margin:60px 0 40px;">Добро пожаловать в VXR</h2>
    <div style="max-width:360px; margin:0 auto;">
      <input id="regUsername" placeholder="Придумайте username" style="width:100%; padding:14px; margin:12px 0; border-radius:8px; border:1px solid #444; background:#222; color:white;"/>
      <input id="regPassword" type="password" placeholder="Пароль" style="width:100%; padding:14px; margin:12px 0; border-radius:8px; border:1px solid #444; background:#222; color:white;"/>
      <button id="doRegister" style="width:100%; padding:14px; background:var(--accent); border:none; color:white; border-radius:8px; font-size:1.1rem; cursor:pointer;">Зарегистрироваться</button>
      <div style="text-align:center; margin:20px 0; color:var(--gray);">или</div>
      <button id="toLogin" style="width:100%; padding:14px; background:#444466; border:none; color:white; border-radius:8px; cursor:pointer;">Уже есть аккаунт → Войти</button>
    </div>
  </div>

  <!-- Экран входа -->
  <div id="loginScreen" class="screen">
    <h2 style="text-align:center; margin:80px 0 40px;">Вход в VXR</h2>
    <div style="max-width:360px; margin:0 auto;">
      <input id="loginUsername" placeholder="Username" style="width:100%; padding:14px; margin:12px 0; border-radius:8px; border:1px solid #444; background:#222; color:white;"/>
      <input id="loginPassword" type="password" placeholder="Пароль" style="width:100%; padding:14px; margin:12px 0; border-radius:8px; border:1px solid #444; background:#222; color:white;"/>
      <button id="doLogin" style="width:100%; padding:14px; background:var(--accent); border:none; color:white; border-radius:8px; font-size:1.1rem; cursor:pointer;">Войти</button>
      <button id="backToReg" style="width:100%; margin-top:16px; padding:14px; background:transparent; border:1px solid var(--gray); color:var(--gray); border-radius:8px; cursor:pointer;">Назад</button>
    </div>
  </div>

  <!-- Лента -->
  <div id="feed" class="screen">
    <div class="new-post">
      <textarea id="postText" placeholder="Что у тебя нового?"></textarea>
      <label class="attach" for="postPhoto">+ Фото</label>
      <input type="file" id="postPhoto" accept="image/*"/>
      <button id="publishPost">Опубликовать</button>
    </div>
    <div id="postsList"></div>
  </div>

  <!-- Чаты -->
  <div id="chats" class="screen">
    <div style="margin:16px 0;">
      <input id="searchUser" placeholder="Найти по @username..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #444; background:#222; color:white;"/>
    </div>
    <div id="recentChats" class="chat-list"></div>
    <div id="chatWindow" class="hidden">
      <div style="padding:12px; background:#111122; border-radius:8px; margin-bottom:12px;">
        <strong id="chatWith"></strong>
      </div>
      <div id="messages" style="min-height:200px; margin-bottom:12px;"></div>
      <textarea id="msgText" placeholder="Сообщение..." style="width:100%; height:80px; padding:12px; background:#222; color:white; border:1px solid #444; border-radius:8px;"></textarea>
      <button id="sendMsg" style="margin-top:8px; padding:10px 20px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer;">Отправить</button>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile" class="screen">
    <div class="profile-header">
      <div class="big-avatar" id="profileAvatar"></div>
      <h2 id="profileName">@username</h2>
      <div class="balance">Баланс: <span id="balance">0</span> VXR</div>
      <button id="buyPremium" style="padding:10px 24px; background:#6644ff; border:none; color:white; border-radius:8px; cursor:pointer;">Премиум — 299 VXR</button>
    </div>

    <div style="margin:24px 0;">
      <h3>Пригласить друга</h3>
      <p style="color:var(--gray); margin:8px 0;">Поделись ссылкой — получи +50 VXR за каждого друга</p>
      <button id="shareInvite" style="padding:12px 24px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer; width:100%;">Поделиться ссылкой</button>
    </div>

    <div style="margin:32px 0;">
      <h3>Мои посты</h3>
      <div id="myPosts"></div>
    </div>

    <div style="margin:32px 0;">
      <h3>Изменить профиль</h3>
      <input id="editName" placeholder="Новое имя / @ник" style="width:100%; padding:12px; margin:8px 0; border-radius:8px; background:#222; color:white; border:1px solid #444;"/>
      <label class="attach" for="editAvatar">Сменить аватар</label>
      <input type="file" id="editAvatar" accept="image/*"/>
      <button id="saveProfile" style="margin-top:12px; padding:12px 24px; background:var(--accent-dark); border:none; color:white; border-radius:8px; cursor:pointer;">Сохранить</button>
    </div>
  </div>

</main>

<!-- Плавающие кнопки -->
<button class="fab hidden" id="fabPost">+</button>
<button class="fab voice hidden" id="fabVoice">🎤</button>

<nav>
  <button id="navFeed">Лента</button>
  <button id="navChats">Чаты</button>
  <button id="navProfile">Профиль</button>
</nav>

<script>
// ──────────────────────────────────────────────
let currentUser = null;
let currentChat = null;

// ──── Хранилище ─────────────────────────────────
function loadData() {
  const data = localStorage.getItem("vxr_data");
  return data ? JSON.parse(data) : { users: {}, posts: [], messages: {} };
}

function saveData(data) {
  localStorage.setItem("vxr_data", JSON.stringify(data));
}

let DB = loadData();

// ──── Авторизация ───────────────────────────────
function isLoggedIn() {
  return !!currentUser;
}

function updateUI() {
  const logged = isLoggedIn();

  document.getElementById("btnLogin").classList.toggle("hidden", logged);
  document.getElementById("btnRegister").classList.toggle("hidden", logged);
  document.getElementById("btnLogout").classList.toggle("hidden", !logged);

  document.getElementById("fabPost").classList.toggle("hidden", !logged);
  document.getElementById("fabVoice").classList.toggle("hidden", !logged);

  if (logged) {
    document.getElementById("welcome").classList.remove("active");
    document.getElementById("loginScreen").classList.remove("active");
    showScreen("feed");
  } else {
    showScreen("welcome");
  }
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("nav" + id.charAt(0).toUpperCase() + id.slice(1)).classList.add("active");

  if (id === "feed") renderFeed();
  if (id === "profile") renderProfile();
  if (id === "chats") renderRecentChats();
}

// ──── Регистрация / Вход ────────────────────────
document.getElementById("doRegister").onclick = () => {
  const un = document.getElementById("regUsername").value.trim();
  const pw = document.getElementById("regPassword").value;

  if (!un || !pw) return alert("Заполни поля");

  if (DB.users[un]) return alert("Такой username уже занят");

  DB.users[un] = {
    username: un,
    password: pw,           // В реальном проекте — хешируй!
    name: un,
    avatar: "",
    balance: 100,
    posts: [],
    premium: false
  };

  saveData(DB);
  alert("Зарегистрирован! Теперь войди.");
  document.getElementById("toLogin").click();
};

document.getElementById("doLogin").onclick = () => {
  const un = document.getElementById("loginUsername").value.trim();
  const pw = document.getElementById("loginPassword").value;

  if (!DB.users[un] || DB.users[un].password !== pw) {
    return alert("Неверный логин или пароль");
  }
  currentUser = DB.users[un];
  saveData(DB);
  updateUI();
};

document.getElementById("btnLogout").onclick = () => {
  currentUser = null;
  updateUI();
};

// Переключения экранов вход/рег
document.getElementById("toLogin").onclick = () => showScreen("loginScreen");
document.getElementById("backToReg").onclick = () => showScreen("welcome");

// ──── Навигация ─────────────────────────────────
document.getElementById("navFeed").onclick    = () => showScreen("feed");
document.getElementById("navChats").onclick   = () => showScreen("chats");
document.getElementById("navProfile").onclick = () => showScreen("profile");

// ──── Публикация поста ──────────────────────────
document.getElementById("publishPost").onclick = () => {
  if (!currentUser) return;

  const text = document.getElementById("postText").value.trim();
  if (!text) return alert("Напиши хоть что-то");

  const post = {
    id: Date.now(),
    user: currentUser.username,
    text,
    photo: "", // пока без фото
    time: new Date().toISOString(),
    type: "text"
  };

  DB.posts.unshift(post);
  currentUser.posts.unshift(post.id);
  saveData(DB);

  document.getElementById("postText").value = "";
  renderFeed();
  renderProfile(); // обновить мои посты
};

function renderFeed() {
  const cont = document.getElementById("postsList");
  cont.innerHTML = "";

  DB.posts.forEach(p => {
    const u = DB.users[p.user] || {avatar:"", name:p.user};
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <div class="post-header">
        <div class="avatar" style="background:url('${u.avatar||''}') center/cover"></div>
        <div>
          <div class="username">${u.name || "@"+p.user}</div>
          <div class="time">${new Date(p.time).toLocaleString([],{hour:"2-digit",minute:"2-digit"})}</div>
        </div>
      </div>
      <div style="margin:8px 0;">${p.text}</div>
      ${p.photo ? <img src="${p.photo}" style="max-width:100%; border-radius:8px; margin-top:8px;"> : ""}
    `;
    cont.appendChild(div);
  });
}

// ──── Профиль ───────────────────────────────────
function renderProfile() {
  if (!currentUser) return;

  document.getElementById("profileName").textContent = currentUser.name || "@"+currentUser.username;
  document.getElementById("profileAvatar").style.backgroundImage = currentUser.avatar ? url(${currentUser.avatar}) : "";
  document.getElementById("balance").textContent = currentUser.balance;

  const mp = document.getElementById("myPosts");
  mp.innerHTML = "";
  currentUser.posts.forEach(pid => {
    const p = DB.posts.find(pp => pp.id === pid);
    if (!p) return;
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = <div>${p.text}</div>;
    if (p.photo) div.innerHTML += <img src="${p.photo}" style="max-width:100%; border-radius:8px; margin-top:8px;">;
    mp.appendChild(div);
  });
}

document.getElementById("saveProfile").onclick = () => {
  if (!currentUser) return;
  const name = document.getElementById("editName").value.trim();
  if (name) currentUser.name = name;

  // здесь можно добавить превью аватарки, но для простоты пропустим
  saveData(DB);
  renderProfile();
  alert("Сохранено");
};

document.getElementById("buyPremium").onclick = () => {
  if (currentUser.balance < 299) return alert("Недостаточно VXR");
  currentUser.balance -= 299;
  currentUser.premium = true;
  saveData(DB);
  alert("Премиум активирован!");
  renderProfile();
};

document.getElementById("shareInvite").onclick = () => {
  const link = window.location.href + "?ref=" + currentUser.username;
  navigator.clipboard.writeText(link).then(() => {
    alert("Ссылка скопирована! Отправь другу\n\nПри регистрации по твоей ссылке — +50 VXR");
  });
};

// ──── Чаты (очень упрощённо) ────────────────────
document.getElementById("searchUser").oninput = e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) return;

  const found = Object.keys(DB.users).filter(u => u.toLowerCase().includes(q) && u !== currentUser.username);
  // можно показывать список, но для простоты — сразу открываем чат с первым
  if (found.length > 0) openChat(found[0]);
};

function openChat(username) {
  currentChat = username;
  document.getElementById("chatWith").textContent = "@" + username;
  document.getElementById("chatWindow").classList.remove("hidden");
  renderMessages();
}

function renderRecentChats() {
  const cont = document.getElementById("recentChats");
  cont.innerHTML = "";

  // имитируем последние чаты — берём всех, у кого есть сообщения
  Object.keys(DB.messages).forEach(key => {
    const [u1, u2] = key.split("_").sort();
    if (u1 !== currentUser.username && u2 !== currentUser.username) return;

    const other = u1 === currentUser.username ? u2 : u1;
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="avatar"></div>
      <div>@${other}</div>
    `;
    div.onclick = () => openChat(other);
    cont.appendChild(div);
  });
}

function renderMessages() {
  const cont = document.getElementById("messages");
  cont.innerHTML = "";
  const key = [currentUser.username, currentChat].sort().join("_");
  const msgs = DB.messages[key] || [];

  msgs.forEach(m => {
    const div = document.createElement("div");
    div.style.margin = "8px 0";
    div.style.textAlign = m.from === currentUser.username ? "right" : "left";
    div.innerHTML = <small style="color:var(--gray);">${m.from === currentUser.username ? "Ты" : "@"+m.from}</small><br>${m.text};
    cont.appendChild(div);
  });
  cont.scrollTop = cont.scrollHeight;
}

document.getElementById("sendMsg").onclick = () => {
  const text = document.getElementById("msgText").value.trim();
  if (!text || !currentChat) return;

  const key = [currentUser.username, currentChat].sort().join("_");
  if (!DB.messages[key]) DB.messages[key] = [];

  DB.messages[key].push({
    from: currentUser.username,
    text,
    time: Date.now()
  });

  saveData(DB);
  document.getElementById("msgText").value = "";
  renderMessages();
  renderRecentChats();
};

// ──── Голосовой пост (заглушка) ─────────────────
document.getElementById("fabVoice").onclick = () => {
  alert("Голосовые посты пока в разработке\n(в реальном проекте нужен Web Audio + Blob + Storage)");
};

// ──── Старт ─────────────────────────────────────
updateUI();

// Если зашёл по реферальной ссылке — можно добавить логику начисления
</script>
</body>
</html>
