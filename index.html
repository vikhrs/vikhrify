<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify Messenger</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: sans-serif; }
        .page { display:none; padding:20px; }
        .active { display:block; }
        .nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#222; padding:15px; }
    </style>
</head>
<body>

    <div id="feed" class="page active">
        <h2>Лента</h2>
        <div id="feed-content">Загрузка...</div>
    </div>

    <div id="profile" class="page">
        <h2>Профиль</h2>
        <div id="profile-content">Загрузка данных...</div>
    </div>

    <nav class="nav">
        <button onclick="loadFeed()">Лента</button>
        <button onclick="loadProfile()">Профиль</button>
    </nav>

    <script>
        // Умная кнопка "Лента"
        async function loadFeed() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('feed').classList.add('active');
            
            const res = await fetch('/api/data');
            const data = await res.json();
            document.getElementById('feed-content').innerHTML = data.posts.map(p => `<p>${p.content}</p>`).join('');
        }

        // Умная кнопка "Профиль"
        async function loadProfile() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('profile').classList.add('active');
            
            const res = await fetch('/api/data');
            const data = await res.json();
            document.getElementById('profile-content').innerHTML = `Имя: ${data.user.name}<br>Подписчики: ${data.user.followers}`;
        }
    </script>
</body>
</html>
