<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background:#0d0d0d; color:#fff; margin:0; padding:0; }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:80px; background:#111; border-right:1px solid #222; display:flex; flex-direction:column; align-items:center; padding-top:20px; z-index:1000; }
    .sidebar i { font-size:2rem; color:#aaa; margin:25px 0; cursor:pointer; transition:0.25s; }
    .sidebar i:hover, .sidebar i.active { color:#0d6efd; transform:scale(1.2); }
    .main-content { margin-left:80px; padding:20px; }
    .fab { position:fixed; bottom:20px; right:20px; width:60px; height:60px; background:#0d6efd; border-radius:50%; color:white; font-size:2.5rem; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(13,110,253,0.5); cursor:pointer; }
    .post { background:#1f1f1f; border-radius:12px; padding:15px; margin-bottom:15px; }
    @media (max-width:767px) {
      .sidebar { bottom:0; top:auto; height:70px; flex-direction:row; justify-content:space-around; }
      .main-content { margin-left:0; margin-bottom:80px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <i class="bi bi-house-door active" onclick="showTab(0)" title="Лента"></i>
  <i class="bi bi-book" onclick="showTab(1)" title="Тренинги"></i>
  <i class="bi bi-chat-dots" onclick="showTab(2)" title="Чат"></i>
  <i class="bi bi-person" onclick="showTab(3)" title="Профиль"></i>
  <i class="bi bi-star" onclick="showTab(4)" title="Premium"></i>
</div>

<div class="fab" onclick="createPost()"><i class="bi bi-plus-lg"></i></div>

<div class="main-content">
  <!-- Лента -->
  <div id="tab0">
    <div id="feed"></div>
  </div>

  <!-- Тренинги (вдохновлено itd.com) -->
  <div id="tab1" style="display:none;">
    <h3>Тренинги и курсы</h3>
    <div class="row">
      <div class="col-md-4 mb-3"><div class="card bg-dark"><div class="card-body">Лидерство и управление</div></div></div>
      <div class="col-md-4 mb-3"><div class="card bg-dark"><div class="card-body">Коммуникации и переговоры</div></div></div>
      <div class="col-md-4 mb-3"><div class="card bg-dark"><div class="card-body">Управление временем</div></div></div>
    </div>
  </div>

  <!-- Чат -->
  <div id="tab2" style="display:none;">
    <h4>Глобальный чат</h4>
    <div id="chatMessages" style="height:400px; overflow-y:auto; background:#1f1f1f; padding:10px; border-radius:8px;"></div>
    <form id="chatForm" class="input-group mt-3">
      <input id="chatInput" class="form-control bg-dark text-white" placeholder="Напишите сообщение...">
      <button type="submit" class="btn btn-primary">Отправить</button>
    </form>
  </div>

  <!-- Профиль -->
  <div id="tab3" style="display:none;">
    <h4>Ваш профиль</h4>
    <p>Никнейм: <b id="myNicknameDisplay"></b></p>
    <button class="btn btn-outline-light" onclick="changeNickname()">Сменить никнейм</button>
  </div>

  <!-- Premium -->
  <div id="tab4" style="display:none;">
    <h4>Premium</h4>
    <p>Пока без функционала</p>
  </div>
</div>

<!-- Модалка ника -->
<div class="modal fade" id="nicknameModal">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5>Введите никнейм</h5>
      </div>
      <div class="modal-body">
        <input id="nicknameInput" class="form-control bg-secondary text-white" placeholder="Ваш никнейм">
        <button class="btn btn-success mt-3 w-100" onclick="saveNickname()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myNickname = localStorage.getItem('vikhrify_nickname') || '';

  if (myNickname) document.getElementById('myNicknameDisplay').textContent = myNickname;

  function showTab(n) {
    document.querySelectorAll('.main-content > div').forEach(d => d.style.display = 'none');
    document.getElementById('tab' + n).style.display = 'block';
    document.querySelectorAll('.sidebar i').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.sidebar i')[n].classList.add('active');
  }

  function createPost() {
    if (!myNickname) {
      new bootstrap.Modal(document.getElementById('nicknameModal')).show();
    } else {
      const text = prompt('Напишите пост:');
      if (text) socket.emit('newPost', text);
    }
  }

  function saveNickname() {
    const nick = document.getElementById('nicknameInput').value.trim();
    if (nick) {
      socket.emit('setNickname', nick);
    }
  }

  socket.on('nicknameAccepted', (nick) => {
    myNickname = nick;
    localStorage.setItem('vikhrify_nickname', nick);
    document.getElementById('myNicknameDisplay').textContent = nick;
    bootstrap.Modal.getInstance(document.getElementById('nicknameModal')).hide();
  });

  socket.on('nicknameTaken', () => {
    alert('Этот никнейм уже занят!');
  });

  socket.on('postsUpdate', (posts) => {
    let html = '';
    posts.forEach(p => {
      html += `<div class="post"><strong>${p.username}</strong> <small>${p.time}</small><br>${p.text}</div>`;
    });
    document.getElementById('feed').innerHTML = html || '<p>Пока нет постов</p>';
  });

  // Чат
  const chatForm = document.getElementById('chatForm');
  chatForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = document.getElementById('chatInput').value.trim();
    if (text && myNickname) {
      socket.emit('chatMessage', { username: myNickname, text });
      document.getElementById('chatInput').value = '';
    }
  });

  socket.on('chatMessage', msg => {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${msg.username}:</strong> ${msg.text}`;
    document.getElementById('chatMessages').appendChild(div);
    div.scrollIntoView();
  });
</script>
</body>
</html>
