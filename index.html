<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #0a0e14 100%);
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    h1 {
      text-align: center;
      color: #58a6ff;
      margin: 0 0 32px;
      font-size: 2.5rem;
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117;
      color: white;
      font-size: 1.1rem;
    }
    input:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.25);
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    #signup-btn {
      background: #238636;
      color: white;
    }
    #signup-btn:hover {
      background: #2ea043;
      transform: translateY(-2px);
    }
    #login-btn {
      background: #444c56;
      color: white;
    }
    #login-btn:hover {
      background: #586069;
      transform: translateY(-2px);
    }
    #status {
      margin-top: 20px;
      text-align: center;
      font-size: 1.1rem;
      min-height: 30px;
    }
    .success { color: #3fb950; font-weight: bold; }
    .error   { color: #f85149; font-weight: bold; }
    .loading { color: #58a6ff; }
  </style>
</head>
<body>

<div class="container">
  <h1>Vikhrify</h1>

  <input id="username" placeholder="Юзернейм" type="text" autocomplete="off">
  <input id="password" placeholder="Пароль" type="password" autocomplete="off">

  <button id="signup-btn">Зарегистрироваться</button>
  <button id="login-btn">Войти</button>

  <div id="status"></div>
</div>

<script>
const statusEl = document.getElementById('status');
const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');

function show(text, type = 'info') {
  statusEl.textContent = text;
  statusEl.className = type;
}

async function register() {
  const u = usernameEl.value.trim();
  const p = passwordEl.value.trim();

  if (!u || !p) return show('Заполни оба поля', 'error');

  show('Регистрирую...', 'loading');

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });

    const data = await res.json();

    if (data.success) {
      show('Добро пожаловать в Vikhrify!', 'success');
      alert('Регистрация прошла! Теперь войди.');
    } else {
      show(data.error || 'Что-то пошло не так', 'error');
    }
  } catch (e) {
    show('Сервер не отвечает — проверь Render', 'error');
    console.error(e);
  }
}

async function login() {
  const u = usernameEl.value.trim();
  const p = passwordEl.value.trim();

  if (!u || !p) return show('Заполни оба поля', 'error');

  show('Вхожу...', 'loading');

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });

    const data = await res.json();

    if (data.success) {
      show('Вход выполнен! Добро пожаловать в Vikhrify!', 'success');
      alert('Ты внутри! (можно добавить переход в ленту)');
    } else {
      show(data.error || 'Неверный логин или пароль', 'error');
    }
  } catch (e) {
    show('Сервер не отвечает — проверь Render', 'error');
    console.error(e);
  }
}

document.getElementById('signup-btn').onclick = register;
document.getElementById('login-btn').onclick = login;

// Для удобства — enter тоже работает
passwordEl.addEventListener('keypress', e => {
  if (e.key === 'Enter') register();
});
</script>
</body>
</html>
