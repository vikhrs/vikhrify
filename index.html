<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikrify</title>
  <style>
    body { font-family: system-ui; background:#111; color:#eee; margin:0; padding:0; height:100vh; display:flex; flex-direction:column; }
    #welcome { position:fixed; inset:0; background:#000c; backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:100; }
    #welcome.hidden { display:none; }
    .card { background:#1e1e1e; padding:20px; border-radius:12px; margin:20px; }
    input, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; font-size:1em; }
    button { background:#0284c7; color:white; cursor:pointer; }
    button:hover { background:#0369a1; }
    .tabs { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; display:flex; justify-content:space-around; padding:10px 0; border-top:1px solid #333; }
    .tab { text-align:center; cursor:pointer; padding:8px; flex:1; }
    .tab.active { background:#0284c7; border-radius:8px; }
    #profile, #chats, #posts { flex:1; overflow-y:auto; display:none; }
    #profile.active, #chats.active, #posts.active { display:block; }
    .avatar { width:90px; height:90px; border-radius:50%; border:3px solid #0284c7; }
    .post { background:#222; padding:16px; margin:12px 0; border-radius:12px; }
  </style>
</head>
<body>

<!-- Приветствие + регистрация/логин -->
<div id="welcome">
  <div class="card" style="max-width:360px;">
    <h2 style="text-align:center;">Добро пожаловать в Vikrify</h2>
    <p style="text-align:center; color:#aaa;">Зарегистрируйся или войди</p>
    
    <input id="reg-name" placeholder="Имя" />
    <input id="reg-username" placeholder="Юзернейм (без @)" />
    <input id="reg-password" type="password" placeholder="Пароль" />
    <button onclick="register()">Зарегистрироваться</button>
    
    <hr style="border:#444; margin:20px 0;" />
    
    <input id="login-username" placeholder="Юзернейм" />
    <input id="login-password" type="password" placeholder="Пароль" />
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- Основной контент -->
<div id="profile" class="active">
  <div class="card">
    <div style="display:flex; align-items:center; gap:20px;">
      <img id="my-avatar" class="avatar" src="" alt="">
      <div>
        <h2 id="my-name"></h2>
        <p id="my-username"></p>
        <p>Баланс: <b id="my-balance">0</b> VXR</p>
      </div>
    </div>
    <h3>Мои посты</h3>
    <div id="my-posts"></div>
  </div>
</div>

<div id="chats">Чаты (пока заглушка — добавим позже)</div>

<div id="posts">
  <div class="card">
    <textarea id="post-text" placeholder="Что нового?" rows="4"></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>
</div>

<!-- Табы внизу -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('profile')">Профиль</div>
  <div class="tab" onclick="switchTab('chats')">Чаты</div>
  <div class="tab" onclick="switchTab('posts')">Посты</div>
</div>

<script>
  let currentUser = null;

  function hideWelcome() {
    document.getElementById('welcome').classList.add('hidden');
  }

  async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();

    if (!name  !username  !password) return alert("Заполни все поля");

    const res = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, username, password })
    });
    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      loadProfile();
      hideWelcome();
    } else {
      alert(data.error);
    }
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      loadProfile();
      hideWelcome();
    } else {
      alert(data.error);
    }
  }

  function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab `).classList.add('active');
    document.querySelectorAll('#profile, #chats, #posts').forEach(d => d.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
  }

  async function loadProfile() {
    const res = await fetch(`/api/me/${currentUser.id}`);
    currentUser = await res.json();

    document.getElementById('my-name').textContent = currentUser.name;
    document.getElementById('my-username').textContent = '@' + currentUser.username;
    document.getElementById('my-avatar').src = currentUser.avatar;
    document.getElementById('my-balance').textContent = currentUser.balance;

    // Мои посты
    const postsRes = await fetch(`/api/posts/${currentUser.id}`);
    const myPosts = await postsRes.json();
    document.getElementById('my-posts').innerHTML = myPosts.map(p => `
      <div class="post">
        <p>${p.content}</p>
        <small>${new Date(p.createdAt).toLocaleString()}</small>
      </div>
    `).join('');
  }

  async function createPost() {
    const content = document.getElementById('post-text').value.trim();
    if (!content) return alert("Напиши текст");

    await fetch('/api/posts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ userId: currentUser.id, content })
    });

    document.getElementById('post-text').value = '';
    switchTab('profile'); // сразу в профиль — твои посты
    loadProfile();
  }

  // Если уже залогинен — пропустить welcome (для теста)
  // currentUser = {id:1}; loadProfile(); hideWelcome();
</script>
</body>
</html>
