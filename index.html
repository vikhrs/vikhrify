<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vikhrify | Лента и Чаты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    
    <div id="burger-menu" class="fixed left-0 top-0 h-full w-64 bg-gray-800 transform -translate-x-full transition-transform z-50">
        <div class="p-5">
            <div id="accounts-list" class="mb-5 border-b border-gray-700 pb-3">
                <p class="text-xs text-gray-400">Аккаунты</p>
                </div>
            <button onclick="openPublishModal()" class="block w-full text-left py-2 hover:text-blue-400">Опубликовать пост</button>
            <button onclick="openSearch()" class="block w-full text-left py-2 hover:text-blue-400">Поиск людей</button>
            <button onclick="logout()" class="block w-full text-left py-2 text-red-500 mt-10">Выйти из аккаунта</button>
        </div>
    </div>

    <header class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-gray-900 z-40">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h1 class="text-xl font-bold tracking-widest text-blue-500">VIKHRIFY</h1>
        <div id="current-user-avatar" class="w-10 h-10 bg-gray-700 rounded-full"></div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <div id="feed" class="space-y-6">
            </div>
    </main>

    <script>
        const socket = io();
        
        // Логика переключения аккаунтов (Мультиаккаунт)
        let currentAccount = JSON.parse(localStorage.getItem('active_acc'));
        
        function toggleMenu() {
            const menu = document.getElementById('burger-menu');
            menu.classList.toggle('-translate-x-full');
        }

        socket.on('feed_update', (post) => {
            const postHTML = `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                    <div class="flex items-center mb-2">
                        <img src="${post.author.avatar}" class="w-8 h-8 rounded-full mr-2 cursor-pointer" onclick="viewProfile('${post.author.username}')">
                        <span class="font-bold">${post.author.name}</span>
                        ${post.author.verified ? '<span class="ml-1 text-blue-400">✔</span>' : ''}
                    </div>
                    <p class="text-gray-200">${post.content}</p>
                </div>
            `;
            document.getElementById('feed').insertAdjacentHTML('afterbegin', postHTML);
        });
    </script>
</body>
</html>
