<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#eee; }
    #auth { position:fixed; inset:0; background:#000c; display:flex; align-items:center; justify-content:center; z-index:100; }
    #auth.hidden { display:none; }
    .card { background:#222; padding:24px; border-radius:12px; width:90%; max-width:400px; }
    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:none; font-size:1rem; }
    button { background:#0284c7; color:white; cursor:pointer; }
    .premium-btn { background:#7c3aed; margin:12px 0; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; display:flex; }
    nav button { flex:1; padding:16px; background:none; border:none; color:#aaa; cursor:pointer; font-size:0.9rem; }
    nav button.active { color:#fff; background:#0284c7; }
    .section { display:none; padding:80px 16px 100px; }
    .section.active { display:block; }
    .post { background:#1e1e1e; padding:16px; margin:12px 0; border-radius:8px; }
    .post img { max-width:100%; border-radius:8px; margin-top:8px; }
    .avatar { width:60px; height:60px; border-radius:50%; object-fit:cover; border:2px solid #0284c7; }
    .verified { color:#1da1f2; font-size:1.2em; margin-left:4px; }
    #chat-search { width:100%; padding:12px; margin-bottom:12px; }
    .chat-item { background:#222; padding:12px; margin:8px 0; border-radius:8px; cursor:pointer; }
    .chat-item:hover { background:#333; }
  </style>
</head>
<body>

<div id="auth">
  <div class="card">
    <h2 style="text-align:center">Vikhrify</h2>
    <input id="name" placeholder="Имя">
    <input id="username" placeholder="Юзернейм">
    <input id="password" type="password" placeholder="Пароль">
    <button onclick="register()">Зарегистрироваться</button>
    <button onclick="login()">Войти</button>
    <div id="auth-msg" style="margin-top:12px; text-align:center; min-height:20px;"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <!-- Лента -->
  <div id="feed" class="section active">
    <h2>Лента</h2>
    <textarea id="post-text" placeholder="Что нового?" rows="3"></textarea>
    <input type="file" id="post-photo" accept="image/*">
    <button onclick="publishPost()">Опубликовать</button>
    <div id="posts-list"></div>
  </div>

  <!-- Чаты -->
  <div id="chats" class="section">
    <h2>Чаты</h2>
    <input id="chat-search" placeholder="Поиск по @юзернейму">
    <button onclick="startChat()">Написать</button>
    <div id="chat-list"></div>
    <div id="chat-window" style="margin-top:16px; background:#222; padding:16px; border-radius:8px; display:none;">
      <div id="chat-messages"></div>
      <input id="chat-input" placeholder="Сообщение..." style="margin-top:12px;">
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile" class="section">
    <h2>Профиль</h2>
    <img id="my-avatar" class="avatar" src="https://via.placeholder.com/60">
    <p>
      <input type="file" id="avatar-upload" accept="image/*" onchange="changeAvatar()">
      <button onclick="document.getElementById('avatar-upload').click()">Сменить фото</button>
    </p>
    <p>Имя: <span id="my-name"></span> <button onclick="editName()">Изменить</button></p>
    <p>Юзернейм: @<span id="my-username"></span></p>
    <p>Баланс: <span id="my-balance">0</span> VXR</p>
    <p>Премиум: <span id="my-premium">нет</span> <button class="premium-btn" onclick="buyPremium()">Купить Premium (299 VXR)</button></p>
    <p>Верификация: <span id="my-verified">—</span></p>
    <h3>Мои посты</h3>
    <div id="my-posts"></div>
  </div>

  <!-- Навигация -->
  <nav>
    <button class="active" onclick="show('feed')">Лента</button>
    <button onclick="show('chats')">Чаты</button>
    <button onclick="show('profile')">Профиль</button>
  </nav>
</div>

<script>
let user = null;
let currentChatUser = null;
const msg = document.getElementById('auth-msg');

// Регистрация и вход (не трогаем)
async function register() {
  msg.innerHTML = '';
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!name || !username || !password) return msg.innerHTML = '<span style="color:#f33">Заполните все поля</span>';

  try {
    const r = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, username, password})
    });
    const d = await r.json();
    if (d.success) {
      msg.innerHTML = '<span style="color:#0f0">Зарегистрирован! Теперь войдите.</span>';
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Ошибка') + '</span>';
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>';
  }
}

async function login() {
  msg.innerHTML = '';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) return msg.innerHTML = '<span style="color:#f33">Заполните юзернейм и пароль</span>';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.success) {
      user = d.user;
      localStorage.setItem('user', JSON.stringify(user));
      document.getElementById('auth').classList.add('hidden');
      document.getElementById('app').style.display = 'block';
      loadProfile();
      loadPosts();
      loadChats();
      show('feed');
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Неверно') + '</span>';
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>';
  }
}

// Автовход
const saved = localStorage.getItem('user');
if (saved) {
  user = JSON.parse(saved);
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  loadProfile();
  loadPosts();
  loadChats();
  show('feed');
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// Лента постов
async function loadPosts() {
  const r = await fetch('/api/posts');
  const all = await r.json();
  document.getElementById('posts-list').innerHTML = all.map(p => `
    <div class="post">
      <div style="display:flex;gap:12px;align-items:center;">
        <img src="${p.avatar}" class="avatar">
        <div>
          <b>${p.name}</b> @${p.username}${p.isVerified ? '<span class="verified">✔</span>' : ''}
        </div>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" alt="фото">` : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  `).join('');
}

async function publishPost() {
  if (!user) return alert('Войдите');
  const content = document.getElementById('post-text').value.trim();
  const file = document.getElementById('post-photo').files[0];

  if (!content) return alert('Напишите текст');

  let image = null;
  if (file) {
    const reader = new FileReader();
    reader.onload = async () => {
      image = reader.result;
      await sendPost(content, image);
    };
    reader.readAsDataURL(file);
  } else {
    await sendPost(content, null);
  }
}

async function sendPost(content, image) {
  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({userId: user.id, content, image})
  });
  document.getElementById('post-text').value = '';
  document.getElementById('post-photo').value = '';
  loadPosts();
}

// Профиль
async function loadProfile() {
  const r = await fetch(`/api/me/${user.id}`);
  user = await r.json();
  localStorage.setItem('user', JSON.stringify(user));

  document.getElementById('my-name').textContent = user.name;
  document.getElementById('my-username').textContent = user.username;
  document.getElementById('my-avatar').src = user.avatar;
  document.getElementById('my-balance').textContent = user.balance;
  document.getElementById('my-premium').textContent = user.isPremium ? 'да' : 'нет';
  document.getElementById('my-verified').innerHTML = user.isVerified ? '<span class="verified">✔ Синяя галочка</span>' : 'нет';

  const pr = await fetch('/api/posts');
  const my = (await pr.json()).filter(p => p.userId === user.id);
  document.getElementById('my-posts').innerHTML = my.map(p => `
    <div class="post">
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" alt="фото">` : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  `).join('');
}

function editName() {
  const newName = prompt('Новое имя:', user.name);
  if (newName && newName.trim()) {
    fetch('/api/profile', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: user.id, name: newName.trim()})
    }).then(() => loadProfile());
  }
}

async function changeAvatar() {
  const file = document.getElementById('avatar-upload').files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async () => {
    const avatar = reader.result;
    await fetch('/api/profile', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: user.id, avatar})
    });
    loadProfile();
  };
  reader.readAsDataURL(file);
}

function buyPremium() {
  if (confirm('Купить Premium за 299 VXR?')) {
    alert('Премиум куплен! (в реальности — списание баланса и установка флага)');
    // Здесь можно добавить запрос на сервер для списания 299 и установки isPremium: true
  }
}

// Чаты
function loadChats() {
  // Пока заглушка — список чатов можно хранить в localStorage или на сервере
  document.getElementById('chat-list').innerHTML = '<p>Ваши чаты появятся после переписки</p>';
}

function startChat() {
  const username = document.getElementById('chat-search').value.trim().replace('@', '');
  if (!username) return alert('Введите юзернейм');

  alert(`Открыт чат с @${username} (реализация переписки — в разработке)`);
  // Здесь можно создать чат на сервере и открыть окно
}

function sendMessage() {
  alert('Сообщение отправлено (реализация в процессе)');
}

// Старт
loadPosts();
</script>
</body>
</html>
