<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0d1117; color:#c9d1d9; height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:40px; width:340px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    h1 { color:#58a6ff; text-align:center; margin-bottom:30px; }
    input { width:100%; padding:12px; margin:10px 0; border:1px solid #30363d; border-radius:6px; background:#0d1117; color:white; font-size:16px; }
    button { width:100%; padding:12px; margin:10px 0; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    #reg { background:#238636; color:white; }
    #log { background:#444c56; color:white; }
    #msg { text-align:center; margin-top:20px; font-size:14px; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
  </style>
</head>
<body>
<div class="box">
  <h1>Vikhrify</h1>
  <input id="u" placeholder="Юзернейм" type="text">
  <input id="p" placeholder="Пароль" type="password">
  <button id="reg">Зарегистрироваться</button>
  <button id="log">Войти</button>
  <div id="msg"></div>
</div>

<script>
const msg = document.getElementById('msg');
const u = document.getElementById('u');
const p = document.getElementById('p');

async function reg() {
  if (!u.value || !p.value) return msg.innerHTML = '<span class="err">Заполни всё, блядь</span>';
  msg.innerHTML = '<span class="ok">Ждём...</span>';
  try {
    const r = await fetch('/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u.value.trim(), password:p.value}) });
    const d = await r.json();
    msg.innerHTML = d.success ? '<span class="ok">Готово, заходи</span>' : <span class="err">${d.error}</span>;
  } catch {
    msg.innerHTML = '<span class="err">Сервер сдох</span>';
  }
}

async function log() {
  if (!u.value || !p.value) return msg.innerHTML = '<span class="err">Заполни всё</span>';
  msg.innerHTML = '<span class="ok">Входим...</span>';
  try {
    const r = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u.value.trim(), password:p.value}) });
    const d = await r.json();
    msg.innerHTML = d.success ? '<span class="ok">Ты в деле</span>' : <span class="err">${d.error}</span>;
  } catch {
    msg.innerHTML = '<span class="err">Сервер сдох</span>';
  }
}

document.getElementById('reg').onclick = reg;
document.getElementById('log').onclick = log;
</script>
</body>
</html>
