<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify | Twitter Style</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #1d9bf0; }
        body { margin:0; background:var(--bg); color:var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Сетка как в Твиттере */
        .container { display: grid; grid-template-columns: 275px 600px 350px; max-width: 1300px; margin: 0 auto; gap: 30px; }
        
        /* Glass Header */
        header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px; z-index: 10; }
        
        /* Посты */
        .post { border-bottom: 1px solid #2f3336; padding: 15px; cursor: pointer; transition: 0.2s; }
        .post:hover { background: rgba(255,255,255,0.03); }
        
        /* Кнопки */
        .btn-tweet { background: var(--accent); color: white; border: none; padding: 15px 60px; border-radius: 9999px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Mobile: превращаем в обычный мессенджер */
        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
            .sidebar-right { display: none; }
            .nav-left { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-left">
        <h2>Vikhrify</h2>
        <button onclick="show('feed')">Главная</button>
        <button onclick="show('profile')">Профиль</button>
        <button class="btn-tweet" onclick="publishPost()">Твитнуть</button>
    </nav>

    <main>
        <header><h2>Главная</h2></header>
        <textarea id="post-text" placeholder="Что происходит?!" style="width:100%; background:none; color:white; border:none; padding:15px; font-size:20px;"></textarea>
        <div id="posts-list"></div>
    </main>

    <aside class="sidebar-right">
        <div class="glass" style="padding:20px; border-radius:20px;">
            <h3>Актуальные темы</h3>
            <p>#VikhrifyLaunch</p>
        </div>
    </aside>
</div>

<script>
    // Твиттер-функции
    async function publishPost() {
        const text = document.getElementById('post-text').value;
        if(!text) return;
        const user = JSON.parse(localStorage.getItem('user'));
        await fetch('/api/posts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({userId: user.id, name: user.name, content: text})
        });
        document.getElementById('post-text').value = '';
        renderPosts();
    }

    async function renderPosts() {
        const res = await fetch('/api/all');
        const d = await res.json();
        document.getElementById('posts-list').innerHTML = d.posts.map(p => `
            <div class="post">
                <b>${p.name}</b><br>
                <p style="font-size: 1.2em;">${p.content}</p>
            </div>
        `).join('');
    }
    
    renderPosts();
</script>
</body>
</html>
