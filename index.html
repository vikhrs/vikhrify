<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikhrify</title>
  <style>
    body { margin:0; font-family:system-ui; background:#0d1117; color:#c9d1d9; }
    #auth { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:9999; }
    #auth.hidden { display:none; }
    .card { background:#161b22; padding:32px; border-radius:12px; width:90%; max-width:380px; border:1px solid #30363d; }
    input, button { width:100%; padding:12px; margin:10px 0; border-radius:6px; font-size:1rem; }
    input { background:#0d1117; border:1px solid #30363d; color:#c9d1d9; }
    button { background:#238636; color:white; border:none; cursor:pointer; font-weight:600; }
    button:hover { background:#2ea043; }
    #auth-message { margin-top:12px; text-align:center; min-height:20px; }
  </style>
</head>
<body>

<div id="auth">
  <div class="card">
    <h2>Vikhrify</h2>
    <input id="name" placeholder="Имя" autocomplete="name">
    <input id="username" placeholder="Юзернейм" autocomplete="username">
    <input id="password" type="password" placeholder="Пароль" autocomplete="new-password">
    <button onclick="register()">Зарегистрироваться</button>

    <div style="margin:20px 0; text-align:center; color:#8b949e;">или войти</div>

    <input id="login-username" placeholder="Юзернейм">
    <input id="login-password" type="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>

    <div id="auth-message"></div>
  </div>
</div>

<div id="app" style="display:none; padding:80px 16px;">
  <h1>Добро пожаловать, <span id="user-name"></span>!</h1>
  <p>Юзернейм: @<span id="user-username"></span></p>
  <button onclick="logout()">Выйти</button>
</div>

<script>
let currentUser = null;
const message = document.getElementById('auth-message');

// Загрузка при старте
window.addEventListener('load', () => {
  const saved = localStorage.getItem('vikhrify_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      if (currentUser && currentUser.username) {
        showApp();
      }
    } catch (e) {
      localStorage.removeItem('vikhrify_user');
    }
  }
});

async function register() {
  message.innerHTML = '';
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!name || !username || !password) {
    message.innerHTML = '<span style="color:#f33">Заполните все поля</span>';
    return;
  }

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, username, password })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      localStorage.setItem('vikhrify_user', JSON.stringify(currentUser));
      message.innerHTML = '<span style="color:#0f0">Регистрация успешна!</span>';
      setTimeout(showApp, 800);
    } else {
      message.innerHTML = `<span style="color:#f33">${data.error || 'Ошибка регистрации'}</span>`;
    }
  } catch (err) {
    message.innerHTML = `<span style="color:#f33">Ошибка: ${err.message}</span>`;
    console.error(err);
  }
}

async function login() {
  message.innerHTML = '';
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();

  if (!username || !password) {
    message.innerHTML = '<span style="color:#f33">Заполните поля</span>';
    return;
  }

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      localStorage.setItem('vikhrify_user', JSON.stringify(currentUser));
      message.innerHTML = '<span style="color:#0f0">Вход выполнен!</span>';
      setTimeout(showApp, 800);
    } else {
      message.innerHTML = `<span style="color:#f33">${data.error || 'Неверные данные'}</span>`;
    }
  } catch (err) {
    message.innerHTML = `<span style="color:#f33">Ошибка: ${err.message}</span>`;
    console.error(err);
  }
}

function showApp() {
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = currentUser.name || currentUser.username;
  document.getElementById('user-username').textContent = currentUser.username;
}

function logout() {
  localStorage.removeItem('vikhrify_user');
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth').classList.remove('hidden');
  message.innerHTML = '<span style="color:#0f0">Вы вышли</span>';
}
</script>
</body>
</html>
