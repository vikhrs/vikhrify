<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikhrify</title>
  <style>
    body { margin:0; font-family:system-ui, sans-serif; background:#0d1117; color:#c9d1d9; }
    #auth { position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:9999; }
    #auth.hidden { display:none; }
    .auth-card { background:#161b22; padding:32px; border-radius:12px; width:90%; max-width:380px; border:1px solid #30363d; }
    input, button { width:100%; padding:12px; margin:10px 0; border-radius:6px; font-size:1rem; }
    input { background:#0d1117; border:1px solid #30363d; color:#c9d1d9; }
    button { background:#238636; color:white; border:none; cursor:pointer; font-weight:600; }
    button:hover { background:#2ea043; }
    #auth-message { margin-top:12px; text-align:center; min-height:20px; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#161b22; border-top:1px solid #30363d; display:flex; height:60px; z-index:100; }
    nav button { flex:1; background:none; border:none; color:#8b949e; cursor:pointer; font-size:0.9rem; }
    nav button.active { color:#58a6ff; font-weight:600; }
    .section { display:none; padding:80px 16px 80px; }
    .section.active { display:block; }
    .profile-header { display:flex; align-items:center; gap:16px; margin:20px 0; padding:16px; background:#161b22; border-radius:12px; border:1px solid #30363d; }
    .avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #30363d; }
    .badge { width:18px; height:18px; border-radius:50%; display:inline-block; margin-left:6px; vertical-align:middle; }
    .badge.blue   { background:#58a6ff; }
    .badge.yellow { background:#f0c300; box-shadow:0 0 10px #f0c300; }
    .badge.red    { background:#ff5555; }
    .search-container { position:absolute; top:16px; right:16px; width:240px; }
    .search-input { width:100%; padding:10px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; }
    #buy-modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; display:none; align-items:center; justify-content:center; }
    #buy-modal.show { display:flex; }
    .buy-card { background:#161b22; padding:24px; border-radius:12px; width:90%; max-width:420px; border:1px solid #30363d; }
  </style>
</head>
<body>

<!-- Окно авторизации -->
<div id="auth">
  <div class="auth-card">
    <h2>Vikhrify</h2>
    <input id="name" placeholder="Имя" autocomplete="name">
    <input id="username" placeholder="Юзернейм" autocomplete="username">
    <input id="password" type="password" placeholder="Пароль" autocomplete="new-password">
    <button onclick="register()">Зарегистрироваться</button>

    <div style="margin:20px 0; text-align:center; color:#8b949e;">или войти</div>

    <input id="login-username" placeholder="Юзернейм">
    <input id="login-password" type="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>

    <div id="auth-message"></div>
  </div>
</div>

<!-- Основной интерфейс -->
<div id="app" style="display:none;">

  <div class="search-container">
    <input id="search-input" class="search-input" placeholder="Поиск @username...">
  </div>

  <!-- Профиль -->
  <div id="profile" class="section active">
    <div class="profile-header">
      <img id="my-avatar" class="avatar" src="https://via.placeholder.com/80?text=User">
      <div>
        <h2 id="my-name">—</h2>
        <p>@<span id="my-username">—</span> <span id="my-badge"></span></p>
        <p>Премиум: <span id="my-premium">нет</span></p>
        <p>Подписчиков: <span id="my-followers">0</span></p>
        <p>Баланс: <span id="my-balance">1000</span> VXR</p>
      </div>
    </div>

    <button onclick="buyPremium()" style="background:#7c3aed; margin:12px 0; width:auto; padding:10px 20px;">Купить Premium (499 VXR)</button>
    <button onclick="openBuyModal()" style="background:#5865f2; margin:12px 0; width:auto; padding:10px 20px;">Купить VXR</button>
    <button onclick="inviteFriends()" style="background:#39d353; margin:12px 0; width:auto; padding:10px 20px;">Пригласить друзей</button>

    <div id="admin-panel" style="display:none; margin-top:24px; padding:16px; background:#161b22; border-radius:12px; border:1px solid #30363d;">
      <h3>Админ-панель</h3>
      <input id="admin-target" placeholder="Юзернейм цели">
      <select id="admin-badge">
        <option value="none">Без галочки</option>
        <option value="blue">Синяя</option>
        <option value="yellow">Жёлтая</option>
        <option value="red">Красная</option>
      </select>
      <button onclick="setBadge()">Выдать галочку</button>

      <div style="margin-top:16px;">
        <h4>Накрутка подписчиков</h4>
        <input id="fake-target" placeholder="Юзернейм">
        <input id="fake-amount" type="number" min="1" value="100">
        <button onclick="fakeFollowers()" style="background:#e67e22;">Накрутить</button>
      </div>
    </div>
  </div>

  <!-- Модалка покупки VXR -->
  <div id="buy-modal">
    <div class="buy-card">
      <h2>Купить VXR</h2>
      <input type="range" id="vxr-range" min="100" max="10000" step="100" value="500" oninput="updateVxr()">
      <p id="vxr-display" style="text-align:center; font-size:1.6rem; margin:16px 0;">500 VXR = 500 ₽</p>
      <button onclick="goToVxrPayment()" style="background:#39d353; margin-top:12px;">Перейти к оплате</button>
      <button onclick="closeBuyModal()" style="background:#30363d; margin-top:8px;">Отмена</button>
    </div>
  </div>

  <nav>
    <button class="active" onclick="showSection('profile')">Профиль</button>
    <button onclick="showSection('feed')">Лента</button>
    <button onclick="showSection('chats')">Чаты</button>
    <button onclick="showSection('buy')">Магазин</button>
  </nav>
</div>

<script>
// Глобальные переменные
let currentUser = null;
const message = document.getElementById('auth-message');

// Автологин
window.addEventListener('load', () => {
  const saved = localStorage.getItem('vikhrify_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      if (currentUser && currentUser.username) {
        showApp();
      }
    } catch (e) {
      localStorage.removeItem('vikhrify_user');
    }
  }
});

// Регистрация
async function register() {
  message.innerHTML = '';
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!name || !username || !password) {
    message.innerHTML = '<span style="color:#f33">Заполните все поля</span>';
    return;
  }

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, username, password })
    });

    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      localStorage.setItem('vikhrify_user', JSON.stringify(currentUser));
      message.innerHTML = '<span style="color:#0f0">Регистрация успешна! Вход выполнен.</span>';
      setTimeout(showApp, 1000);
    } else {
      message.innerHTML = `<span style="color:#f33">${data.error || 'Ошибка'}</span>`;
    }
  } catch (err) {
    message.innerHTML = '<span style="color:#f33">Ошибка сети / сервера</span>';
    console.error('Register error:', err);
  }
}

// Вход
async function login() {
  message.innerHTML = '';
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();

  if (!username || !password) {
    message.innerHTML = '<span style="color:#f33">Заполните поля</span>';
    return;
  }

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      localStorage.setItem('vikhrify_user', JSON.stringify(currentUser));
      message.innerHTML = '<span style="color:#0f0">Вход выполнен!</span>';
      setTimeout(showApp, 1000);
    } else {
      message.innerHTML = `<span style="color:#f33">${data.error || 'Неверные данные'}</span>`;
    }
  } catch (err) {
    message.innerHTML = '<span style="color:#f33">Ошибка сети / сервера</span>';
    console.error('Login error:', err);
  }
}

function showApp() {
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  renderProfile();
  if (currentUser.username === 'admin') {
    document.getElementById('admin-panel').style.display = 'block';
  }
}

function renderProfile() {
  if (!currentUser) return;

  document.getElementById('my-name').textContent = currentUser.name || currentUser.username;
  document.getElementById('my-username').textContent = currentUser.username;
  document.getElementById('my-balance').textContent = currentUser.balance || 1000;
  document.getElementById('my-premium').textContent = currentUser.isPremium ? 'да' : 'нет';

  const badge = document.getElementById('my-badge');
  badge.innerHTML = '';
  if (currentUser.badge && currentUser.badge !== 'none') {
    const span = document.createElement('span');
    span.className = `badge ${currentUser.badge}`;
    badge.appendChild(span);
  }
}

// Показ секции
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`nav button[onclick="showSection('${id}')"]`)?.classList.add('active');
}

// Покупка VXR модалка
function openBuyModal() {
  document.getElementById('buy-modal').classList.add('show');
}

function closeBuyModal() {
  document.getElementById('buy-modal').classList.remove('show');
}

function updateVxr() {
  const val = document.getElementById('vxr-range').value;
  document.getElementById('vxr-display').textContent = `${val} VXR = ${val} ₽`;
}

function goToVxrPayment() {
  closeBuyModal();
  window.location.href = 'https://vxr.tilda.ws/';
}

// Приглашение
function inviteFriends() {
  const code = currentUser.referralCode || currentUser.id;
  prompt('Ссылка для друзей:', `${location.origin}?ref=${code}`);
}

// Покупка премиума (заглушка, добавь fetch на /api/buy-premium если нужно)
function buyPremium() {
  alert('Покупка премиума за 499 VXR (добавь fetch на сервер)');
}

// Админ функции (заглушки)
function setBadge() { alert('Выдача галочки — добавь fetch'); }
function fakeFollowers() { alert('Накрутка — добавь fetch на /api/fake-followers'); }
</script>
</body>
</html>
