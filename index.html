<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#eee; }
    #auth { position:fixed; inset:0; background:#000c; display:flex; align-items:center; justify-content:center; z-index:100; }
    #auth.hidden { display:none; }
    .card { background:#222; padding:24px; border-radius:12px; width:90%; max-width:400px; }
    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:none; font-size:1rem; }
    button { background:#0284c7; color:white; cursor:pointer; }
    .premium-btn { background:#7c3aed; margin:12px 0; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; display:flex; }
    nav button { flex:1; padding:16px; background:none; border:none; color:#aaa; cursor:pointer; font-size:0.9rem; }
    nav button.active { color:#fff; background:#0284c7; }
    .section { display:none; padding:80px 16px 100px; }
    .section.active { display:block; }
    .post { background:#1e1e1e; padding:16px; margin:12px 0; border-radius:8px; }
    .post img { max-width:100%; border-radius:8px; margin-top:8px; }
    .avatar { width:60px; height:60px; border-radius:50%; object-fit:cover; border:2px solid #0284c7; }
    .badge { width:16px; height:16px; border-radius:50%; display:inline-block; margin-left:6px; vertical-align:middle; }
    .badge.blue   { background:#1da1f2; }
    .badge.yellow { background:#ffd700; box-shadow:0 0 8px #ffd700; }
    .badge.red    { background:#ff4444; }
    .author-name { cursor:pointer; font-weight:bold; }
    .author-name:hover { color:#1da1f2; }
    .search-container { position:absolute; top:16px; right:16px; width:240px; z-index:10; }
    .search-input { padding:10px; background:#222; border:1px solid #444; color:#eee; border-radius:6px; width:100%; }
    .search-results { position:absolute; top:100%; left:0; right:0; background:#222; border:1px solid #444; border-radius:6px; max-height:300px; overflow-y:auto; display:none; }
    .search-results.show { display:block; }
    .search-item { padding:10px; cursor:pointer; display:flex; gap:12px; align-items:center; }
    .search-item:hover { background:#333; }
    #chat-list, #chat-window { margin:16px 0; }
    .chat-item { padding:12px; background:#1e1e1e; margin:8px 0; border-radius:8px; cursor:pointer; }
    .chat-item:hover { background:#2a2a2a; }
    .message { margin:8px 0; padding:10px; border-radius:12px; max-width:80%; }
    .message.sent { background:#0284c7; align-self:flex-end; }
    .message.received { background:#444; align-self:flex-start; }
    #messages { display:flex; flex-direction:column; max-height:400px; overflow-y:auto; padding:16px; background:#111; border-radius:8px; }
    #buy-modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; display:none; align-items:center; justify-content:center; }
    #buy-modal.show { display:flex; }
    .buy-card { background:#222; padding:24px; border-radius:12px; width:90%; max-width:400px; }
    .amount { text-align:center; font-size:1.8rem; margin:8px 0; }
    .price { text-align:center; font-size:1.6rem; color:#ffd700; }
    input[type="range"] { width:100%; accent-color: #0284c7; }
    #other-profile-modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; display:none; align-items:center; justify-content:center; }
    #other-profile-modal.show { display:flex; }
    .profile-card { background:#222; padding:24px; border-radius:12px; width:90%; max-width:400px; }
  </style>
</head>
<body>

<div id="auth">
  <div class="card">
    <h2 style="text-align:center">Vikhrify</h2>
    <input id="name" placeholder="Имя">
    <input id="username" placeholder="Юзернейм">
    <input id="password" type="password" placeholder="Пароль">
    <button onclick="register()">Зарегистрироваться</button>
    <button onclick="login()">Войти</button>
    <div id="auth-msg" style="margin-top:12px; text-align:center; min-height:20px;"></div>
  </div>
</div>

<div id="app" style="display:none;">

  <div class="search-container">
    <input id="search-input" class="search-input" placeholder="Поиск @username..." autocomplete="off">
    <div id="search-results" class="search-results"></div>
  </div>

  <div id="feed" class="section active">
    <h2>Лента</h2>
    <textarea id="post-text" placeholder="Что нового?" rows="3"></textarea>
    <input type="file" id="post-photo" accept="image/*">
    <button onclick="publishPost()">Опубликовать</button>
    <div id="posts-list"></div>
  </div>

  <div id="chats" class="section">
    <h2>Чаты</h2>
    <input id="chat-search" placeholder="Найти пользователя по @username..." style="margin-bottom:12px;">
    <div id="chat-list"></div>
    <div id="chat-window" style="display:none;">
      <h3>Чат с <span id="chat-with"></span></h3>
      <div id="messages"></div>
      <textarea id="message-text" placeholder="Сообщение..." rows="2"></textarea>
      <button onclick="sendMessage()">Отправить</button>
      <button onclick="closeChat()">Закрыть</button>
    </div>
  </div>

  <div id="buy" class="section">
    <h2>Магазин</h2>
    <button class="premium-btn" onclick="buyPremium()">Купить Premium (499 VXR)</button>
    <button onclick="openBuyModal()">Купить VXR (от 100 до 10000)</button>
  </div>

  <div id="profile" class="section">
    <h2>Профиль</h2>
    <img id="my-avatar" class="avatar" src="https://via.placeholder.com/60">
    <p>
      <input type="file" id="avatar-upload" accept="image/*" onchange="changeAvatar()">
      <button onclick="document.getElementById('avatar-upload').click()">Сменить аватарку</button>
    </p>
    <p>Имя: <span id="my-name"></span> <button onclick="editName()">Изменить</button></p>
    <p>Юзернейм: @<span id="my-username"></span></p>
    <p>Галочка: <span id="my-badge">—</span></p>
    <p>Премиум: <span id="my-premium">нет</span></p>
    <p>Подписчиков: <span id="my-followers">0</span></p>
    <p>Баланс: <span id="my-balance">0</span> VXR</p>
    <button onclick="inviteFriends()">Пригласить друзей (+50 VXR за каждого)</button>

    <div id="admin-panel" style="display:none; margin-top:20px; padding:16px; background:#222; border-radius:8px;">
      <h3>Админ-панель</h3>
      <input id="admin-target" placeholder="Юзернейм цели">
      <select id="admin-badge">
        <option value="none">Без галочки</option>
        <option value="blue">Синяя</option>
        <option value="yellow">Жёлтая</option>
        <option value="red">Красная</option>
      </select>
      <button onclick="setBadge()">Выдать галочку</button>
      <button onclick="clearFeed()" style="background:#ff4444;">Очистить всю ленту</button>

      <div style="margin-top:20px;">
        <h4>Накрутка подписчиков</h4>
        <input id="fake-followers-target" placeholder="Юзернейм цели">
        <input id="fake-followers-amount" type="number" min="1" max="100000" placeholder="На сколько накрутить" value="100">
        <button onclick="fakeFollowers()" style="background:#e67e22; margin-top:8px;">Накрутить подписчиков</button>
      </div>
    </div>

    <h3>Мои посты</h3>
    <div id="my-posts"></div>
  </div>

  <nav>
    <button class="active" onclick="show('feed')">Лента</button>
    <button onclick="show('chats')">Чаты</button>
    <button onclick="show('buy')">Магазин</button>
    <button onclick="show('profile')">Профиль</button>
  </nav>
</div>

<!-- Модалка покупки VXR (редирект на внешнюю оплату) -->
<div id="buy-modal">
  <div class="buy-card">
    <h2>Купить VXR</h2>
    <p style="text-align:center; color:#aaa;">Выберите количество (от 100 до 10000)</p>
    <input type="range" id="vxr-amount" min="100" max="10000" step="100" value="100" oninput="updateBuyUI()">
    <div class="amount" id="amount-text">100 VXR</div>
    <div class="price" id="price-text">100 ₽</div>
    <button onclick="buyVXR()">Перейти к оплате</button>
    <button onclick="closeBuyModal()">Отмена</button>
  </div>
</div>

<!-- Модалка чужого профиля -->
<div id="other-profile-modal">
  <div class="profile-card">
    <img id="other-avatar" class="avatar" src="">
    <p>Имя: <span id="other-name"></span></p>
    <p>@<span id="other-username"></span></p>
    <p>Галочка: <span id="other-badge"></span></p>
    <p>Подписчиков: <span id="other-followers"></span></p>
    <button id="follow-btn" onclick="followUser()">Подписаться</button>
    <button onclick="closeOtherProfile()">Закрыть</button>
  </div>
</div>

<script>
let user = null;
const msg = document.getElementById('auth-msg');
let currentChatWith = null;
let currentViewedUser = null;

// ─── РЕГИСТРАЦИЯ И ВХОД ────────────────────────────────────────────────────────────────
async function register() {
  msg.innerHTML = '';
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!name || !username || !password) return msg.innerHTML = '<span style="color:#f33">Заполните все поля</span>';

  try {
    const r = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, username, password})
    });
    const d = await r.json();
    if (d.success) {
      msg.innerHTML = '<span style="color:#0f0">Зарегистрирован! Теперь войдите.</span>';
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Ошибка') + '</span>';
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>';
  }
}

async function login() {
  msg.innerHTML = '';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) return msg.innerHTML = '<span style="color:#f33">Заполните юзернейм и пароль</span>';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.success) {
      user = d.user;
      localStorage.setItem('user', JSON.stringify(user));
      document.getElementById('auth').classList.add('hidden');
      document.getElementById('app').style.display = 'block';
      loadProfile();
      loadPosts();
      loadChats();
      show('feed');
      if (user.username === 'admin') document.getElementById('admin-panel').style.display = 'block';
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Неверно') + '</span>';
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>';
  }
}

// Автовход
const saved = localStorage.getItem('user');
if (saved) {
  try {
    user = JSON.parse(saved);
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    loadProfile();
    loadPosts();
    loadChats();
    show('feed');
    if (user.username === 'admin') document.getElementById('admin-panel').style.display = 'block';
  } catch {
    localStorage.removeItem('user');
  }
} else {
  document.getElementById('auth').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
}

// ─── Остальные функции ────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`nav button[onclick="show('${id}')"]`)?.classList.add('active');
}

function openBuyModal() {
  if (!user) return alert('Сначала войди');
  document.getElementById('buy-modal').classList.add('show');
  updateBuyUI();
}

function closeBuyModal() {
  document.getElementById('buy-modal').classList.remove('show');
}

function updateBuyUI() {
  const amount = document.getElementById('vxr-amount').value;
  document.getElementById('amount-text').textContent = amount + ' VXR';
  document.getElementById('price-text').textContent = amount + ' ₽';
}

function buyVXR() {
  const amount = document.getElementById('vxr-amount').value;
  closeBuyModal();
  window.location.href = 'https://vxr.tilda.ws/';
}

async function fakeFollowers() {
  if (user.username !== 'admin') return alert('Только админ может это делать');

  const targetUsername = document.getElementById('fake-followers-target').value.trim();
  const amount = parseInt(document.getElementById('fake-followers-amount').value);

  if (!targetUsername || isNaN(amount) || amount < 1) {
    return alert('Введите корректный username и количество (минимум 1)');
  }

  if (!confirm(`Накрутить ${amount} подписчиков пользователю @${targetUsername}?`)) return;

  try {
    const res = await fetch('/api/fake-followers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminId: user.id, targetUsername, amount })
    });
    const data = await res.json();

    if (data.success) {
      alert(`Успешно накручено +${amount} подписчиков!\nНовый счёт: ${data.newFollowers}`);
      if (currentViewedUser === targetUsername) {
        viewUserProfile(targetUsername);
      }
      loadProfile(); // если накручиваем себе — обновим свой профиль
    } else {
      alert(data.error || 'Ошибка');
    }
  } catch (e) {
    alert('Ошибка сети');
  }
}

// Заглушки для остальных функций (добавь сюда свой реальный код)
function loadPosts() { console.log('loadPosts вызван'); }
function publishPost() { console.log('publishPost вызван'); }
function loadProfile() { console.log('loadProfile вызван'); }
function buyPremium() { alert('Покупка Premium — обратись к админу или в магазин'); }
function setBadge() { alert('setBadge вызван — добавь логику'); }
function clearFeed() { alert('clearFeed вызван — добавь логику'); }
function loadChats() { console.log('loadChats вызван'); }
function sendMessage() { console.log('sendMessage вызван'); }
function inviteFriends() { alert('Ссылка для приглашения: ' + location.origin + '?ref=XXXXXX'); }
function changeAvatar() { console.log('changeAvatar вызван'); }
function editName() { console.log('editName вызван'); }
function viewUserProfile(username) { alert('Открыт профиль @' + username); }
function followUser() { console.log('followUser вызван'); }
function closeOtherProfile() { document.getElementById('other-profile-modal').classList.remove('show'); }
</script>
</body>
</html>
