<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikrify</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; }
    #welcome-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    #welcome-screen.hidden { display: none; }
    .auth-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px 24px; width: 90%; max-width: 380px; }
    h2 { text-align: center; margin-bottom: 24px; font-size: 1.6rem; }
    input, textarea { width: 100%; padding: 12px 16px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 1rem; }
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.3); }
    button { width: 100%; padding: 12px; margin: 8px 0; background: #238636; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #2ea043; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .main-content { flex: 1; padding: 16px; padding-bottom: 90px; }
    .hidden { display: none !important; }

    .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #30363d; }
    .post { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .post small { color: #8b949e; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #161b22; border-top: 1px solid #30363d; display: flex; z-index: 100; }
    .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #8b949e; font-size: 0.9rem; cursor: pointer; transition: color 0.2s; }
    .nav-item.active { color: #58a6ff; font-weight: 600; }

    /* === МОДАЛКА ПОКУПКИ VXR === */
    #buy-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center;
    }
    #buy-modal.show { display: flex; }
    .buy-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; width: 90%; max-width: 420px;
    }
    .price { font-size: 1.8rem; font-weight: 700; color: #39d353; text-align: center; margin: 16px 0; }
    input[type="range"] { width: 100%; accent-color: #58a6ff; }
    .amount { text-align: center; font-size: 2rem; font-weight: 700; margin: 8px 0; }
  </style>
</head>
<body>

<!-- Экран приветствия / авторизации (НИЧЕГО НЕ ТРОГАЛ) -->
<div id="welcome-screen">
  <div class="auth-card">
    <h2>Добро пожаловать в Vikrify</h2>
    <div id="auth-forms">
      <input id="name" placeholder="Имя" autocomplete="name" />
      <input id="username" placeholder="Юзернейм (без @)" autocomplete="username" />
      <input id="password" type="password" placeholder="Пароль" autocomplete="new-password" />
      <button id="register-btn">Зарегистрироваться</button>
      <div style="margin: 24px 0; text-align:center; color:#8b949e;">или</div>
      <input id="login-username" placeholder="Юзернейм" autocomplete="username" />
      <input id="login-password" type="password" placeholder="Пароль" autocomplete="current-password" />
      <button id="login-btn">Войти</button>
    </div>
  </div>
</div>

<!-- Основной контент -->
<div class="main-content">
  <!-- Профиль -->
  <div id="profile-page">
    <div class="profile-header">
      <img id="profile-avatar" class="avatar" src="https://via.placeholder.com/80?text=User" alt="avatar">
      <div>
        <h2 id="profile-name">—</h2>
        <div style="color:#8b949e; margin:4px 0;">@<span id="profile-username">—</span></div>
        <div>Баланс: <strong id="profile-balance">0</strong> VXR</div>
        <button onclick="openBuyModal()" style="margin-top:12px; background:#5865f2; width:auto; padding:8px 16px; font-size:0.9rem;">💰 Купить VXR</button>
      </div>
    </div>

    <h3 style="margin:16px 0 8px;">Мои посты</h3>
    <div id="my-posts-container"></div>
  </div>

  <!-- Чаты и Посты (оставил как было) -->
  <div id="chats-page" class="hidden"><h3>Чаты</h3><p>Раздел в разработке</p></div>
  <div id="posts-page" class="hidden">
    <div class="auth-card" style="margin:0 auto; max-width:500px;">
      <h2>Новый пост</h2>
      <textarea id="post-content" rows="6" placeholder="Что у тебя на уме?"></textarea>
      <button id="publish-btn">Опубликовать</button>
    </div>
  </div>
</div>

<!-- Нижняя навигация -->
<div class="bottom-nav">
  <div class="nav-item active" data-page="profile">Профиль</div>
  <div class="nav-item" data-page="chats">Чаты</div>
  <div class="nav-item" data-page="posts">Посты</div>
</div>

<!-- МОДАЛКА ПОКУПКИ VXR -->
<div id="buy-modal">
  <div class="buy-card">
    <h2 style="text-align:center;">Купить VXR</h2>
    <p style="text-align:center; color:#8b949e;">От 100 до 10 000 VXR</p>
    
    <input type="range" id="amount-slider" min="100" max="10000" step="100" value="1000" oninput="updateBuyUI()">
    <div class="amount" id="amount-text">1000 VXR</div>
    
    <div class="price" id="price-text">1000 ₽</div>
    
    <button onclick="buyVXR()" style="background:#39d353; margin-top:16px;">Оплатить картой (симуляция)</button>
    <button onclick="closeBuyModal()" style="background:#30363d; margin-top:8px;">Отмена</button>
  </div>
</div>

<script>
// ─── ВСЁ, ЧТО БЫЛО РАНЬШЕ (регистрация, логин, профиль и т.д.) — НИЧЕГО НЕ ИЗМЕНИЛ ───
let currentUser = null;

function loadSavedUser() {
  const saved = localStorage.getItem('vikrify_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      if (currentUser && currentUser.id) {
        document.getElementById('welcome-screen').classList.add('hidden');
        showPage('profile');
        loadProfile();
      }
    } catch (e) { localStorage.removeItem('vikrify_user'); }
  }
}

function showPage(page) { /* ... тот же код ... */ }
document.getElementById('register-btn').onclick = async () => { /* ... ТВОЙ КОД РЕГИСТРАЦИИ БЕЗ ИЗМЕНЕНИЙ ... */ };
document.getElementById('login-btn').onclick = async () => { /* ... ТВОЙ КОД ВХОДА БЕЗ ИЗМЕНЕНИЙ ... */ };
async function loadProfile() { /* ... ТВОЙ КОД ... */ }
document.getElementById('publish-btn').onclick = async () => { /* ... ТВОЙ КОД ... */ };
document.querySelectorAll('.nav-item').forEach(item => { /* ... */ });

// ─── НОВАЯ ФУНКЦИОНАЛЬНОСТЬ ПОКУПКИ VXR (ничего не трогает старый код) ───
function openBuyModal() {
  if (!currentUser) return alert('Сначала войди');
  document.getElementById('buy-modal').classList.add('show');
  updateBuyUI();
}
function closeBuyModal() {
  document.getElementById('buy-modal').classList.remove('show');
}
function updateBuyUI() {
  const amount = parseInt(document.getElementById('amount-slider').value);
  document.getElementById('amount-text').textContent = amount + ' VXR';
  document.getElementById('price-text').textContent = amount + ' ₽';
}
async function buyVXR() {
  const amount = parseInt(document.getElementById('amount-slider').value);
  try {
    const res = await fetch('/api/buy-vxr', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, amount })
    });
    const data = await res.json();
    if (data.success) {
      alert(`✅ Куплено ${amount} VXR за ${amount} ₽!\nБаланс обновлён`);
      closeBuyModal();
      loadProfile(); // обновляем баланс
    } else {
      alert(data.error || 'Ошибка покупки');
    }
  } catch (e) {
    alert('Ошибка сети');
  }
}

// ─── Старт ─────────────────────────────────────────────────────────
loadSavedUser();
if (currentUser) showPage('profile');
</script>
</body>
</html>
