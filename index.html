<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vikhrify Messenger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { --bg: #050505; --text: #eee; --accent: #0284c7; }
        .light-theme { --bg: #ffffff; --text: #111; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:sans-serif; height:100vh; overflow:hidden; }
        
        /* Glassmorphism */
        .glass { background: rgba(30,30,30,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .light-theme .glass { background: rgba(255,255,255,0.7); }

        /* Auth */
        #auth { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .card { width:90%; max-width:320px; padding:25px; border-radius:20px; text-align:center; }
        
        /* Mobile Layout */
        #app { display:none; height:100%; display:flex; flex-direction:column; }
        .section { flex:1; overflow-y:auto; padding:20px; padding-bottom:80px; display:none; }
        .section.active { display:block; }
        
        /* Burger */
        #sidebar { position:fixed; top:0; left:-280px; width:260px; height:100%; z-index:500; transition:0.3s; padding:60px 20px; }
        #sidebar.open { left:0; }

        /* Helpers */
        .verified::after { content: " ✔"; color: #1da1f2; }
        .avatar { width:60px; height:60px; border-radius:50%; object-fit:cover; }
        input, button { width:100%; padding:14px; margin:10px 0; border-radius:12px; border:none; background:#222; color:white; }
        button { background:var(--accent); cursor:pointer; }
    </style>
</head>
<body>

<div id="auth">
    <div class="card glass">
        <h2>Vikhrify</h2>
        <input id="reg-name" placeholder="Имя">
        <input id="reg-user" placeholder="Username (англ)">
        <input id="reg-pass" type="password" placeholder="Пароль">
        <button onclick="auth('register')">Регистрация</button>
        <button onclick="auth('login')">Войти</button>
    </div>
</div>

<div id="app">
    <div class="burger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</div>
    <div id="sidebar" class="glass">
        <button onclick="show('profile')">Профиль</button>
        <button onclick="publishPostFromMenu()">Создать пост</button>
        <button onclick="toggleTheme()">Сменить тему</button>
        <button onclick="logout()">Выйти</button>
    </div>

    <div id="feed" class="section active">
        <h2>Лента</h2>
        <div id="posts-list"></div>
    </div>
    
    <div id="profile" class="section">
        <div id="profile-content"></div>
    </div>

    <nav class="glass" style="position:fixed; bottom:0; width:100%; display:flex;">
        <button onclick="show('feed')">Лента</button>
        <button onclick="show('chats')">Чаты</button>
        <button onclick="show('profile')">Профиль</button>
    </nav>
</div>

<script>
    // Theme logic
    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    // Auth logic with uniqueness check
    async function auth(type) {
        const username = document.getElementById('reg-user').value.toLowerCase().replace(/[^a-z0-9]/g, '');
        const password = document.getElementById('reg-pass').value;
        const name = document.getElementById('reg-name').value;
        
        const res = await fetch(`/api/${type}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password, name})
        });
        const data = await res.json();
        
        if(data.success) {
            localStorage.setItem('user', JSON.stringify(data.user));
            location.reload();
        } else {
            alert(data.error || "Ошибка! Юзернейм может быть занят.");
        }
    }

    // Auto-update
    setInterval(async () => {
        const res = await fetch('/api/all');
        const d = await res.json();
        renderPosts(d.posts);
    }, 3000);

    function renderPosts(posts) {
        document.getElementById('posts-list').innerHTML = posts.map(p => `
            <div class="post glass" onclick="viewProfile(${p.userId})">
                <b class="${p.isVerified ? 'verified' : ''}">${p.name}</b>
                <p>${p.content}</p>
            </div>
        `).join('');
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
